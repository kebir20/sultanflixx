<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SultanFlix IPTV Checker</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

body{
background:#0f0f0f;
color:white;
font-family:Arial;
text-align:center;
}

h2{
margin-top:20px;
}

.controls{
margin:20px;
}

input,button{
padding:10px;
margin:5px;
border-radius:6px;
border:none;
}

button{
background:#e50914;
color:white;
cursor:pointer;
}

button:hover{
background:#ff1f2f;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #333;
}

.working{
color:#00ff6a;
font-weight:bold;
}

.not-working{
color:#ff3c3c;
font-weight:bold;
}

.logo{
width:40px;
border-radius:6px;
}

#player{
margin-top:20px;
width:80%;
max-width:700px;
}

</style>
</head>

<body>

<h2>📡 SultanFlix IPTV Checker</h2>

<div class="controls">

<input type="file" id="fileInput">
<input type="text" id="m3uUrl" placeholder="🔗 رابط M3U">

<button onclick="loadM3U()">تحميل القائمة</button>
<button onclick="exportWorking()">تحميل القنوات الشغالة</button>

<input type="text" id="search" placeholder="🔍 بحث عن قناة" oninput="searchChannels()">

</div>

<video id="player" controls></video>

<table>

<thead>
<tr>
<th>#</th>
<th>Logo</th>
<th>القناة</th>
<th>تشغيل</th>
<th>الحالة</th>
</tr>
</thead>

<tbody id="channelList"></tbody>

</table>

<script>

let channels=[]

async function fetchM3U(url){

const res=await fetch(url)
return await res.text()

}

function parseM3U(text){

const lines=text.split("\n")

let parsed=[]
let current={}

for(let line of lines){

line=line.trim()

if(line.startsWith("#EXTINF")){

let name=line.match(/,(.+)$/)
current.name=name?name[1]:"Unknown"

let logo=line.match(/tvg-logo="(.+?)"/)
current.logo=logo?logo[1]:""

}

else if(line && !line.startsWith("#")){

current.url=line

parsed.push({...current})

current={}

}

}

return parsed

}

async function checkChannel(url){

try{

const controller=new AbortController()

setTimeout(()=>controller.abort(),4000)

const res=await fetch(url,{method:"HEAD",signal:controller.signal})

return res.ok

}

catch{

return false

}

}

async function loadM3U(){

let data=""

const file=document.getElementById("fileInput").files[0]

const url=document.getElementById("m3uUrl").value

if(file){

data=await file.text()

}

else if(url){

data=await fetchM3U(url)

}

channels=parseM3U(data)

renderTable()

checkChannels()

}

function renderTable(){

const list=document.getElementById("channelList")

list.innerHTML=""

channels.forEach((c,i)=>{

let row=document.createElement("tr")

row.innerHTML=`

<td>${i+1}</td>

<td><img class="logo" src="${c.logo}" onerror="this.style.display='none'"></td>

<td>${c.name}</td>

<td><button onclick="playChannel('${c.url}')">▶️ تشغيل</button></td>

<td id="status-${i}">🔍</td>

`

list.appendChild(row)

})

}

async function checkChannels(){

for(let i=0;i<channels.length;i++){

let ok=await checkChannel(channels[i].url)

let cell=document.getElementById("status-"+i)

cell.textContent=ok?"✅":"❌"

cell.className=ok?"working":"not-working"

channels[i].status=ok

}

}

function playChannel(url){

const video=document.getElementById("player")

if(Hls.isSupported()){

const hls=new Hls()

hls.loadSource(url)

hls.attachMedia(video)

}

else{

video.src=url

}

video.play()

}

function searchChannels(){

let value=document.getElementById("search").value.toLowerCase()

let rows=document.querySelectorAll("#channelList tr")

rows.forEach(r=>{

let name=r.children[2].textContent.toLowerCase()

r.style.display=name.includes(value)?"":"none"

})

}

function exportWorking(){

let text="#EXTM3U\n"

channels.filter(c=>c.status).forEach(c=>{

text+=`#EXTINF:-1,${c.name}\n${c.url}\n`

})

let blob=new Blob([text])

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="working_channels.m3u"

a.click()

}

</script>

</body>
</html>
