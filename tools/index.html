<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">

<title>SultanFlix IPTV Toolkit</title>

<style>

body{
background:#0f0f0f;
color:white;
font-family:sans-serif;

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:40px;
}

.card{
background:#1a1a1a;
padding:30px;
border-radius:10px;
cursor:pointer;
transition:.3s;
}

.card:hover{
background:#e50914;
}

</style>

</head>

<body>

<h1>📡 SultanFlix IPTV Toolkit</h1>

<div class="grid">

<div class="card" onclick="location.href='iptv-checker/'">
IPTV Checker
</div>

<div class="card" onclick="location.href='iptv-editor/'">
IPTV Editor
</div>

<div class="card" onclick="location.href='iptv-speed/'">
IPTV Speed Analyzer
</div>

<div class="card" onclick="location.href='iptv-scanner/'">
IPTV Scanner
</div>

<div class="card" onclick="location.href='xtream-player/'">
Xtream Player
</div>

<div class="card" onclick="location.href='m3u-generator/'">
M3U Generator
</div>

<div class="card" onclick="location.href='logo-downloader/'">
Logo Downloader
</div>

<div class="card" onclick="location.href='auto-finder/'">
IPTV Auto Finder
</div>

</div>

</body>
</html>
