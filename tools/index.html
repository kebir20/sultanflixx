<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>SultanFlix IPTV Toolkit</title>

<style>

body{
background:#0f0f0f;
color:white;
font-family:sans-serif;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:40px;
}

.card{
background:#1a1a1a;
padding:30px;
border-radius:10px;
cursor:pointer;
}

.card:hover{
background:#e50914;
}

</style>

</head>

<body>

<h1>📡 SultanFlix IPTV Toolkit</h1>

<div class="grid">

<div class="card" onclick="openTool('iptv-checker')">
IPTV Checker
</div>

<div class="card" onclick="openTool('iptv-editor')">
IPTV Editor
</div>

<div class="card" onclick="openTool('iptv-speed')">
IPTV Speed Test
</div>

<div class="card" onclick="openTool('iptv-scanner')">
IPTV Scanner
</div>

<div class="card" onclick="openTool('xtream-player')">
Xtream Player
</div>

<div class="card" onclick="openTool('m3u-generator')">
M3U Generator
</div>

<div class="card" onclick="openTool('auto-finder')">
IPTV Finder
</div>

</div>

<script>

function openTool(name){
window.location.href=name+"/"
}

</script>

</body>
</html>
