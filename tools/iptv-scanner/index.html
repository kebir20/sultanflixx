<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>IPTV Scanner</title>
</head>

<body style="background:#000;color:white;text-align:center">

<h2>🔎 IPTV Scanner</h2>

<button onclick="scan()">Search IPTV Lists</button>

<ul id="lists"></ul>

<script>

async function scan(){

const url="https://api.github.com/search/code?q=extension:m3u+iptv"

let res=await fetch(url)

let data=await res.json()

let container=document.getElementById("lists")

container.innerHTML=""

data.items.slice(0,30).forEach(item=>{

let li=document.createElement("li")

li.innerHTML=`
<a href="https://raw.githubusercontent.com/${item.repository.full_name}/master/${item.path}" target="_blank">
${item.repository.full_name}
</a>
`

container.appendChild(li)

})

}

</script>

</body>
</html>
