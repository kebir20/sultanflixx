<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>SultanFlix IPTV Global Scanner</title>

<style>

body{
background:#0f0f0f;
color:white;
font-family:sans-serif;
text-align:center;
}

button{
background:#e50914;
color:white;
border:none;
padding:12px;
margin:10px;
cursor:pointer;
border-radius:6px;
}

#results{
max-width:900px;
margin:auto;
}

.card{
background:#1a1a1a;
margin:10px;
padding:15px;
border-radius:6px;
}

a{
color:#00d0ff;
text-decoration:none;
}

</style>

</head>

<body>

<h1>🌍 IPTV Global Scanner</h1>

<button onclick="scanGithub()">GitHub</button>
<button onclick="scanReddit()">Reddit</button>
<button onclick="scanPastebin()">Pastebin</button>

<h2>Results</h2>

<div id="results"></div>

<script>

const results = document.getElementById("results")

function add(title,url){

let card=document.createElement("div")

card.className="card"

card.innerHTML=`
<a href="${url}" target="_blank">
${title}
</a>
`

results.appendChild(card)

}

/* =========================
GITHUB SEARCH
========================= */

async function scanGithub(){

results.innerHTML="Searching GitHub..."

let res = await fetch(
"https://api.github.com/search/repositories?q=iptv+m3u&sort=stars"
)

let data = await res.json()

results.innerHTML=""

data.items.slice(0,20).forEach(repo=>{

add(repo.full_name,repo.html_url)

})

}

/* =========================
REDDIT SEARCH
========================= */

async function scanReddit(){

results.innerHTML="Searching Reddit..."

let res = await fetch(
"https://www.reddit.com/search.json?q=iptv+m3u"
)

let data = await res.json()

results.innerHTML=""

data.data.children.slice(0,20).forEach(post=>{

add(post.data.title,post.data.url)

})

}

/* =========================
PASTEBIN SEARCH
========================= */

async function scanPastebin(){

results.innerHTML="Searching Pastebin..."

const urls=[

"https://pastebin.com/raw/8A0h2kF6",
"https://pastebin.com/raw/Zm0pXQyQ",
"https://pastebin.com/raw/tp4zjH1r"

]

results.innerHTML=""

urls.forEach(u=>{

add("M3U Playlist",u)

})

}

</script>

</body>
</html>
