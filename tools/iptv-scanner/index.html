<script>

const results = document.getElementById("results")

function addResult(name,url){

let li = document.createElement("li")

li.innerHTML = `<a href="${url}" target="_blank">${name}</a>`

results.appendChild(li)

}

/* =========================
GITHUB IPTV SEARCH
========================= */

async function scanGithub(){

results.innerHTML="Searching GitHub..."

try{

const res = await fetch(
"https://api.github.com/search/repositories?q=iptv+m3u&sort=stars"
)

const data = await res.json()

results.innerHTML=""

data.items.slice(0,20).forEach(repo=>{

const playlist =
`https://raw.githubusercontent.com/${repo.full_name}/master/playlist.m3u`

addResult(repo.full_name,repo.html_url)

})

}catch(e){

results.innerHTML="GitHub search failed"

}

}

/* =========================
REDDIT IPTV SEARCH
========================= */

async function scanReddit(){

results.innerHTML="Searching Reddit..."

const res = await fetch(
"https://www.reddit.com/search.json?q=iptv+m3u"
)

const data = await res.json()

results.innerHTML=""

data.data.children.slice(0,20).forEach(post=>{

let url = post.data.url

let title = post.data.title

addResult(title,url)

})

}

</script>
