<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV Pro+</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 10px;
            background: #f0f0f0;
            transition: background 0.3s, color 0.3s;
        }

        .dark-mode {
            background: #1a1a1a;
            color: white;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 15px 0;
        }

        button, select {
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #007bff;
            color: white;
            font-size: 14px;
        }

        video {
            width: 100%;
            max-height: 250px;
            background: black;
            border-radius: 10px;
        }

        .channel-list {
            margin-top: 15px;
            background: white;
            border-radius: 10px;
            padding: 10px;
            max-height: 60vh;
            overflow-y: auto;
        }

        .channel-item {
            padding: 15px;
            margin: 5px 0;
            cursor: pointer;
            text-align: center;
            color: #333;
            transition: all 0.3s;
        }

        .channel-item.selected {
            background: #007bff;
            color: white;
        }

        .favorite-star {
            color: gold;
            margin-left: 10px;
        }

        .category-buttons {
            margin: 10px 0;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .category-btn {
            background: #28a745 !important;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>
    <h1 style="text-align:center;">IPTV Pro+</h1>
    
    <video id="videoPlayer" controls playsinline></video>
    
    <div class="controls">
        <button id="playPauseBtn">⏯ تشغيل</button>
        <button id="muteBtn">🔊 كتم</button>
        <button id="fullscreenBtn">⛶ شاشة كاملة</button>
        <button id="addToFavoritesBtn">⭐ مفضلة</button>
        <select id="qualitySelect">
            <option value="all">كل الجودات</option>
            <option value="SD">SD</option>
            <option value="HD">HD</option>
            <option value="FHD">FHD</option>
            <option value="SK">SK</option>
            <option value="UHD">UHD</option>
        </select>
        <button id="prevBtn">السابق</button>
        <button id="nextBtn">التالي</button>
        <button id="randomBtn">🎲 عشوائي</button>
        <button id="toggleFavoritesBtn">📌 عرض المفضلة</button>
        <button id="themeBtn">🌙 وضع ليلي</button>
    </div>

    <div class="category-buttons" id="categoriesContainer">
        <button class="category-btn active" data-category="all">الكل</button>
    </div>

    <div class="channel-list" id="channelList">
        <!-- القنوات المطلوبة -->
        <div class="channel-item" data-id="7263" data-quality="FHD">Arena Sport 1 FHD HR</div>

<div class="channel-item" data-id="7329" data-quality="HD">Arena Sport 1 HD HR</div>

<div class="channel-item" data-id="2550" data-quality="Standard">Arena Sport 1 SK</div>

<div class="channel-item" data-id="7264" data-quality="FHD">Arena Sport 2 FHD HR</div>

<div class="channel-item" data-id="14032" data-quality="HD">QazSport HD</div>
<div class="channel-item" data-id="19025" data-quality="HD">Auto Motor Sport HD</div>
<div class="channel-item" data-id="19026" data-quality="HD">Sport Digital HD</div>
        <!-- ... باقي القنوات -->
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>

const BASE_URL = "https://54606f57.megatv.fun/iptv/DUTA3CP8CMLPXT/";
let currentChannels = [];
let favorites = JSON.parse(localStorage.getItem('favorites')) || [];
let isFavoriteMode = false;
let currentCategory = "all";
let hls = null;

const video = document.getElementById("videoPlayer");


/* تشغيل القناة */
let hls;

let hls = null;

function playChannel(channel){

const video = document.getElementById("videoPlayer");

document.querySelectorAll(".channel-item").forEach(c=>{
c.classList.remove("selected");
});

channel.classList.add("selected");

const channelId = channel.dataset.id;

const streamUrl = BASE_URL + channelId + "/index.m3u8";


if(hls){
hls.destroy();
hls = null;
}


if(Hls.isSupported()){

hls = new Hls({
enableWorker:true,
lowLatencyMode:true,
liveDurationInfinity:true
});

hls.loadSource(streamUrl);
hls.attachMedia(video);

hls.on(Hls.Events.MANIFEST_PARSED,function(){

video.play().catch(()=>{});

});

}else{

video.src = streamUrl;
video.play();

}

}

/* تصفية القنوات */

function filterChannels(){

    const quality = document.getElementById("qualitySelect").value;

    const channels = document.querySelectorAll(".channel-item");

    channels.forEach(ch=>{

        const qualityMatch = quality==="all" || ch.dataset.quality===quality;
        const favoriteMatch = !isFavoriteMode || favorites.includes(ch.dataset.id);

        ch.style.display = (qualityMatch && favoriteMatch) ? "block":"none";

    });

    currentChannels = [...channels].filter(c=>c.style.display!=="none");

}


/* تشغيل عشوائي */

function playRandom(){

    if(currentChannels.length===0)return;

    const i = Math.floor(Math.random()*currentChannels.length);

    playChannel(currentChannels[i]);

}


/* تشغيل / ايقاف */

function togglePlay(){

    if(video.paused){

        video.play();

    }else{

        video.pause();

    }

}


/* كتم الصوت */

function toggleMute(){

    video.muted = !video.muted;

}


/* شاشة كاملة */

function toggleFullscreen(){

    if(!document.fullscreenElement){

        video.requestFullscreen();

    }else{

        document.exitFullscreen();

    }

}


/* المفضلة */

function addToFavorites(){

    const selected = document.querySelector(".channel-item.selected");

    if(!selected) return;

    const id = selected.dataset.id;

    const index = favorites.indexOf(id);

    if(index===-1){

        favorites.push(id);

    }else{

        favorites.splice(index,1);

    }

    localStorage.setItem("favorites",JSON.stringify(favorites));

}


/* عرض المفضلة */

function toggleFavorites(){

    isFavoriteMode = !isFavoriteMode;

    filterChannels();

}


/* الوضع الليلي */

function toggleTheme(){

    document.body.classList.toggle("dark-mode");

}


/* التهيئة */

function init(){

    document.querySelectorAll(".channel-item").forEach(ch=>{

        ch.addEventListener("click",()=>{

            playChannel(ch);

        });

    });


    document.getElementById("playPauseBtn").onclick = togglePlay;
    document.getElementById("muteBtn").onclick = toggleMute;
    document.getElementById("fullscreenBtn").onclick = toggleFullscreen;
    document.getElementById("addToFavoritesBtn").onclick = addToFavorites;
    document.getElementById("toggleFavoritesBtn").onclick = toggleFavorites;
    document.getElementById("randomBtn").onclick = playRandom;
    document.getElementById("themeBtn").onclick = toggleTheme;

    document.getElementById("qualitySelect").addEventListener("change",filterChannels);

    filterChannels();

}


document.addEventListener("DOMContentLoaded",init);

</script>
</body>
</html>
