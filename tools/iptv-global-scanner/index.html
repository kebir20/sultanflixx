<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>IPTV Global Scanner PRO MAX</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

body{
background:#0f0f0f;
color:white;
font-family:sans-serif;
text-align:center;
}

button{
background:#e50914;
border:none;
padding:10px 20px;
color:white;
margin:6px;
cursor:pointer;
border-radius:6px;
}

input,select{
padding:8px;
margin:6px;
border-radius:6px;
border:none;
}

#results{
max-width:800px;
margin:auto;
}

.channel{
background:#1a1a1a;
margin:10px;
padding:15px;
border-radius:8px;
}

.channel:hover{
background:#e50914;
}

video{
width:90%;
margin-top:20px;
}

.status{
font-size:12px;
opacity:0.8;
}

</style>

</head>

<body>

<h1>🌍 IPTV Global Scanner PRO MAX</h1>

<button onclick="scanGitHub()">GitHub</button>
<button onclick="scanReddit()">Reddit</button>
<button onclick="scanPastebin()">Pastebin</button>
<button onclick="scanInternet()">Scan Internet</button>
<button onclick="downloadPlaylist()">Download M3U</button>

<br>

<input id="search" placeholder="🔎 Search Channel" onkeyup="searchChannel()">

<select onchange="filterQuality(this.value)">
<option value="">All Quality</option>
<option value="1080">1080p</option>
<option value="720">720p</option>
<option value="480">480p</option>
<option value="360">360p</option>
</select>

<div id="count"></div>

<br>

<video id="player" controls></video>

<div id="results"></div>

<script>

let channels=[]
let urls=new Set()

async function loadM3U(url){

try{

const proxy="https://corsproxy.io/?"

let res = await fetch(proxy + encodeURIComponent(url))

let text = await res.text()

parseM3U(text)

}catch(e){

console.log("failed",url)

}

}

function parseM3U(data){

let lines=data.split("\n")

for(let i=0;i<lines.length;i++){

if(lines[i].startsWith("#EXTINF")){

let name = lines[i].split(",")[1] || "Unknown"

let url = lines[i+1]

if(!url) continue

url=url.trim()

if(urls.has(url)) continue

urls.add(url)

channels.push({name,url})

createChannel(name,url)

}

}

updateCount()

}

async function checkStream(url){

try{

const controller=new AbortController()

const timeout=setTimeout(()=>controller.abort(),4000)

const res=await fetch(url,{
method:"HEAD",
signal:controller.signal
})

clearTimeout(timeout)

return res.ok

}catch{

return false

}

}

function createChannel(name,url){

let div=document.createElement("div")
div.className="channel"

div.innerHTML=`

<b>${name}</b>

<br>

<button onclick="play('${url}')">▶ Play</button>

<span class="status">🟢 Working</span>

`

document.getElementById("results").appendChild(div)

}

function play(url){

const video=document.getElementById("player")

video.pause()
video.removeAttribute("src")
video.load()

if(window.hlsPlayer){
window.hlsPlayer.destroy()
}

if(Hls.isSupported()){

window.hlsPlayer = new Hls({
maxBufferLength:30,
maxMaxBufferLength:60
})

window.hlsPlayer.loadSource(url)
window.hlsPlayer.attachMedia(video)

window.hlsPlayer.on(Hls.Events.MANIFEST_PARSED,function(){
video.play()
})

}else if(video.canPlayType("application/vnd.apple.mpegurl")){

video.src=url
video.play()

}else{

alert("Stream not supported")

}

}

function searchChannel(){

let input=document.getElementById("search").value.toLowerCase()

let cards=document.querySelectorAll(".channel")

cards.forEach(card=>{

card.style.display=

card.innerText.toLowerCase().includes(input)

?"block":"none"

})

}

function filterQuality(q){

let cards=document.querySelectorAll(".channel")

cards.forEach(card=>{

if(q=="" || card.innerText.includes(q))
card.style.display="block"
else
card.style.display="none"

})

}

function updateCount(){

document.getElementById("count").innerHTML=

"Channels Found: "+channels.length

}

function downloadPlaylist(){

let m3u="#EXTM3U\n"

channels.forEach(c=>{

m3u+=`#EXTINF:-1,${c.name}\n${c.url}\n`

})

let blob=new Blob([m3u])

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="sultanflix_playlist.m3u"

a.click()

}

async function scanGitHub(){

const proxy="https://corsproxy.io/?"

const repos=[

"https://raw.githubusercontent.com/iptv-org/iptv/master/index.m3u",
"https://raw.githubusercontent.com/iptv-org/iptv/master/languages/ara.m3u",
"https://raw.githubusercontent.com/iptv-org/iptv/master/categories/sports.m3u",
"https://raw.githubusercontent.com/iptv-org/iptv/master/categories/news.m3u",
"https://raw.githubusercontent.com/Free-TV/IPTV/master/playlist.m3u",
"https://raw.githubusercontent.com/iptv-org/iptv/master/languages/eng.m3u"

]

for(let url of repos){

try{

let res=await fetch(proxy+encodeURIComponent(url))
let text=await res.text()

parseM3U(text)

}catch(e){

console.log("GitHub failed:",url)

}

}

}

async function scanReddit(){

const proxy="https://corsproxy.io/?"

try{

let res = await fetch(proxy+"https://www.reddit.com/search.json?q=iptv+m3u")

let data = await res.json()

data.data.children.forEach(post=>{

let text = post.data.selftext + " " + post.data.url

let links = text.match(/https?:\/\/[^ ]+\.m3u/g)

if(links){

links.forEach(link=>{

loadM3U(link)

})

}

})

}catch(e){

console.log("Reddit scan failed")

}

}

async function scanPastebin(){

const proxy="https://corsproxy.io/?"

let pastes=[

"https://pastebin.com/raw/Zm6PnTqL",
"https://pastebin.com/raw/k9m3u8tv",
"https://pastebin.com/raw/iptvlinks",
"https://pastebin.com/raw/m3uplaylist"

]

for(let url of pastes){

try{

let res=await fetch(proxy+encodeURIComponent(url))
let text=await res.text()

parseM3U(text)

}catch(e){

console.log("Pastebin failed:",url)

}

}

}

function scanInternet(){

let lists=[

"https://iptv-org.github.io/iptv/index.m3u",
"https://iptv-org.github.io/iptv/languages/ara.m3u",
"https://iptv-org.github.io/iptv/languages/eng.m3u",
"https://iptv-org.github.io/iptv/categories/news.m3u",
"https://iptv-org.github.io/iptv/categories/sports.m3u",
"https://iptv-org.github.io/iptv/categories/movies.m3u",
"https://iptv-org.github.io/iptv/categories/kids.m3u",
"https://iptv-org.github.io/iptv/categories/music.m3u",
"https://iptv-org.github.io/iptv/categories/documentary.m3u"

]

lists.forEach(loadM3U)

}

</script>

</body>

</html>
