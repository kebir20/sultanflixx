<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>SULTANFLIX IPTV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

body{
background:#0f0f0f;
color:white;
font-family:Arial;
margin:0;
text-align:center;
}

header{
background:black;
padding:20px;
font-size:30px;
font-weight:bold;
color:#e50914;
}

.controls{
padding:20px;
}

button{
background:#e50914;
border:none;
padding:10px 20px;
color:white;
margin:6px;
cursor:pointer;
border-radius:6px;
font-size:16px;
}

input,select{
padding:10px;
margin:6px;
border-radius:6px;
border:none;
font-size:16px;
}

#count{
margin-top:10px;
opacity:0.8;
}

video{
width:90%;
max-height:500px;
margin-top:20px;
background:black;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
gap:15px;
padding:20px;
}

.card{
background:#1a1a1a;
border-radius:8px;
padding:10px;
cursor:pointer;
transition:.2s;
}

.card:hover{
transform:scale(1.05);
background:#e50914;
}

.card img{
width:100%;
height:80px;
object-fit:contain;
background:black;
border-radius:6px;
}

.name{
margin-top:6px;
font-size:14px;
}
  
#playerContainer{
position:sticky;
top:0;
z-index:999;
background:#000;
padding:10px 0;
box-shadow:0 4px 20px rgba(0,0,0,0.6);
}

#player{
width:95%;
max-height:450px;
background:black;
border-radius:8px;
}

</style>

</head>

<body>

<header>📺 SULTANFLIX IPTV</header>

<div class="controls">

<button onclick="scanInternet()">🌍 Load Channels</button>

<button onclick="loadSports()">⚽ Sports</button>

<button onclick="downloadPlaylist()">⬇ Download M3U</button>

<br>

<input id="search" placeholder="🔎 Search Channel" onkeyup="searchChannel()">

<select onchange="filterCountry(this.value)">
<option value="">All Countries</option>
<option value="AR">Arabic</option>
<option value="US">USA</option>
<option value="GB">UK</option>
<option value="FR">France</option>
<option value="ES">Spain</option>
</select>

<div id="count">Channels Found: 0</div>

</div>

<div id="playerContainer">

<video id="player" controls></video>

</div>

<div id="results" class="grid"></div>

<script>

let channels=[]
let urls=new Set()
let hlsPlayer=null

/* تحميل ملف m3u */

async function loadM3U(url){

try{

let res = await fetch(url)

if(!res.ok) throw new Error()

let text = await res.text()

parseM3U(text)

}catch{

try{

const proxy="https://api.allorigins.win/raw?url="

let res = await fetch(proxy + encodeURIComponent(url))

let text = await res.text()

parseM3U(text)

}catch(e){

console.log("Failed:",url)

}

}

}

/* تحليل القنوات */

function parseM3U(data){

let lines=data.split("\n")

for(let i=0;i<lines.length;i++){

if(lines[i].startsWith("#EXTINF")){

let line=lines[i]

let name=line.split(",")[1] || "Unknown"

let logo=""

let country=""

let logoMatch=line.match(/tvg-logo="(.*?)"/)

if(logoMatch) logo=logoMatch[1]

let countryMatch=line.match(/tvg-country="(.*?)"/)

if(countryMatch) country=countryMatch[1]

let url=lines[i+1]

if(!url) continue

url=url.trim()

if(urls.has(url)) continue

urls.add(url)

channels.push({name,url,logo,country})

createChannel(name,url,logo,country)

}

}

updateCount()

}

/* إنشاء بطاقة القناة */

function createChannel(name,url,logo,country){

let div=document.createElement("div")
div.className="card"
div.dataset.country=country

div.innerHTML=`

<img src="${logo || 'https://upload.wikimedia.org/wikipedia/commons/4/41/No_image_available.svg'}">

<div class="name">${name}</div>

`

div.onclick=()=>play(url)

document.getElementById("results").appendChild(div)

}

/* تشغيل القناة */

function play(url){

let video=document.getElementById("player")

if(hlsPlayer){
hlsPlayer.destroy()
}

if(Hls.isSupported()){

hlsPlayer=new Hls()

hlsPlayer.loadSource(url)

hlsPlayer.attachMedia(video)

hlsPlayer.on(Hls.Events.MANIFEST_PARSED,function(){
video.play()
})

}else{

video.src=url
video.play()

}

}

/* البحث */

function searchChannel(){

let input=document.getElementById("search").value.toLowerCase()

document.querySelectorAll(".card").forEach(card=>{

card.style.display=

card.innerText.toLowerCase().includes(input)

?"block":"none"

})

}

/* فلترة الدولة */

function filterCountry(c){

document.querySelectorAll(".card").forEach(card=>{

if(c=="" || card.dataset.country.includes(c))
card.style.display="block"
else
card.style.display="none"

})

}

/* عدد القنوات */

function updateCount(){

document.getElementById("count").innerText=
"Channels Found: "+channels.length

}

/* تحميل قائمة */

function downloadPlaylist(){

let m3u="#EXTM3U\n"

channels.forEach(c=>{

m3u+=`#EXTINF:-1,${c.name}\n${c.url}\n`

})

let blob=new Blob([m3u])

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="sultanflix_playlist.m3u"

a.click()

}

/* جلب القنوات */

function scanInternet(){

document.getElementById("results").innerHTML=""

channels=[]
urls=new Set()

let lists=[

"https://iptv-org.github.io/iptv/index.m3u",
"https://iptv-org.github.io/iptv/languages/ara.m3u",
"https://iptv-org.github.io/iptv/languages/eng.m3u",
"https://iptv-org.github.io/iptv/categories/news.m3u",
"https://iptv-org.github.io/iptv/categories/sports.m3u",
"https://iptv-org.github.io/iptv/categories/movies.m3u"

]

lists.forEach(loadM3U)

}

/* قسم الرياضة */

function loadSports(){

document.getElementById("results").innerHTML=""

channels=[]
urls=new Set()

loadM3U("https://iptv-org.github.io/iptv/categories/sports.m3u")

}

</script>

</body>
</html>
