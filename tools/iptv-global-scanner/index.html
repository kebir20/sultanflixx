<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>IPTV Global Scanner PRO MAX</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

body{
background:#0f0f0f;
color:white;
font-family:sans-serif;
text-align:center;
}

button{
background:#e50914;
border:none;
padding:10px 20px;
color:white;
margin:6px;
cursor:pointer;
border-radius:6px;
}

input,select{
padding:8px;
margin:6px;
border-radius:6px;
border:none;
}

#results{
max-width:800px;
margin:auto;
}

.channel{
background:#1a1a1a;
margin:10px;
padding:15px;
border-radius:8px;
}

.channel:hover{
background:#e50914;
}

video{
width:90%;
margin-top:20px;
}

.status{
font-size:12px;
opacity:0.8;
}

</style>

</head>

<body>

<h1>🌍 IPTV Global Scanner PRO MAX</h1>

<button onclick="scanGitHub()">GitHub</button>
<button onclick="scanReddit()">Reddit</button>
<button onclick="scanPastebin()">Pastebin</button>
<button onclick="scanInternet()">Scan Internet</button>
<button onclick="downloadPlaylist()">Download M3U</button>

<br>

<input id="search" placeholder="🔎 Search Channel" onkeyup="searchChannel()">

<select onchange="filterQuality(this.value)">
<option value="">All Quality</option>
<option value="1080">1080p</option>
<option value="720">720p</option>
<option value="480">480p</option>
<option value="360">360p</option>
</select>

<div id="count"></div>

<br>

<video id="player" controls></video>

<div id="results"></div>

<script>

let channels=[]
let urls=new Set()

async function loadM3U(url){

try{

let res = await fetch(url)
let text = await res.text()

parseM3U(text)

}catch(e){
console.log("failed",url)
}

}

function parseM3U(data){

let lines=data.split("\n")

for(let i=0;i<lines.length;i++){

if(lines[i].startsWith("#EXTINF")){

let name=lines[i].split(",")[1] || "Unknown"

let url=lines[i+1]

if(!url || urls.has(url)) continue

urls.add(url)

checkStream(url).then(ok=>{

if(ok){

channels.push({name,url})

createChannel(name,url)

updateCount()

}

})

}

}

}

async function checkStream(url){

try{

const controller=new AbortController()

const timeout=setTimeout(()=>controller.abort(),4000)

const res=await fetch(url,{
method:"HEAD",
signal:controller.signal
})

clearTimeout(timeout)

return res.ok

}catch{

return false

}

}

function createChannel(name,url){

let div=document.createElement("div")
div.className="channel"

div.innerHTML=`

<b>${name}</b>

<br>

<button onclick="play('${url}')">▶ Play</button>

<span class="status">🟢 Working</span>

`

document.getElementById("results").appendChild(div)

}

function play(url){

let video=document.getElementById("player")

if(Hls.isSupported()){

const hls=new Hls()

hls.loadSource(url)

hls.attachMedia(video)

}else{

video.src=url

}

}

function searchChannel(){

let input=document.getElementById("search").value.toLowerCase()

let cards=document.querySelectorAll(".channel")

cards.forEach(card=>{

card.style.display=

card.innerText.toLowerCase().includes(input)

?"block":"none"

})

}

function filterQuality(q){

let cards=document.querySelectorAll(".channel")

cards.forEach(card=>{

if(q=="" || card.innerText.includes(q))
card.style.display="block"
else
card.style.display="none"

})

}

function updateCount(){

document.getElementById("count").innerHTML=

"Channels Found: "+channels.length

}

function downloadPlaylist(){

let m3u="#EXTM3U\n"

channels.forEach(c=>{

m3u+=`#EXTINF:-1,${c.name}\n${c.url}\n`

})

let blob=new Blob([m3u])

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="sultanflix_playlist.m3u"

a.click()

}

async function scanGitHub(){

alert("GitHub scanner limited by API")

}

async function scanReddit(){

let res=await fetch(

"https://www.reddit.com/search.json?q=iptv+m3u"

)

let data=await res.json()

data.data.children.forEach(p=>{

console.log(p.data.url)

})

}

function scanPastebin(){

let urls=[

"https://pastebin.com/raw/iptv",
"https://pastebin.com/raw/m3u"

]

urls.forEach(loadM3U)

}

function scanInternet(){

let lists=[

"https://iptv-org.github.io/iptv/index.m3u",
"https://iptv-org.github.io/iptv/languages/ara.m3u",
"https://iptv-org.github.io/iptv/categories/news.m3u",
"https://iptv-org.github.io/iptv/categories/sports.m3u"

]

lists.forEach(loadM3U)

}

</script>

</body>

</html>
