<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📋 مستخرج روابط IPTV – خفيف وبسيط</title>
    <style>
        body {
            background: #0b1120;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            padding: 20px;
            color: #e2e8f0;
        }
        .container {
            max-width: 1000px;
            margin: auto;
        }
        .card {
            background: #1e293b;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        input, button {
            background: #0f172a;
            border: 1px solid #334155;
            padding: 10px 15px;
            border-radius: 40px;
            color: white;
            font-size: 14px;
        }
        button {
            background: #3b82f6;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        button:hover {
            background: #2563eb;
        }
        .flex {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
            align-items: center;
        }
        .category-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 15px 0;
        }
        .cat-btn {
            background: #334155;
            border: none;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 13px;
        }
        .cat-btn.active {
            background: #3b82f6;
        }
        textarea {
            width: 100%;
            height: 400px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 16px;
            color: #cbd5e6;
            padding: 15px;
            font-family: monospace;
            font-size: 13px;
            direction: ltr;
            text-align: left;
            resize: vertical;
        }
        .copy-all-btn {
            background: #10b981;
            margin-top: 10px;
        }
        .stats {
            font-size: 14px;
            color: #94a3b8;
        }
        hr {
            border-color: #334155;
        }
        .file-row {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .file-label {
            background: #2d3748;
            padding: 8px 18px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }
        .file-label:hover {
            background: #4a5568;
        }
        input[type="file"] {
            display: none;
        }
        .fetch-file-btn {
            background: #f59e0b;
        }
        .fetch-file-btn:hover {
            background: #d97706;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h2>📡 مستخرج روابط Xtream Codes <span style="font-size:14px;">(نسخ جماعي للمجموعات)</span></h2>
        <div class="flex">
            <input type="text" id="serverUrl" placeholder="http://cf.aminera.xyz:80" dir="ltr">
            <input type="text" id="username" placeholder="UN56WA7" dir="ltr">
            <input type="password" id="password" placeholder="Y6P6326" dir="ltr">
            <button id="fetchBtn">🔍 جلب البيانات</button>
        </div>
        <div id="connectionStatus" class="stats"></div>
    </div>

    <!-- بطاقة رفع الملف مع زر معالجة منفصل -->
    <div class="card">
        <div class="file-row">
            <label class="file-label">
                📂 اختيار ملف من جهازك
                <input type="file" id="localFileInput" accept=".txt,.m3u,.csv,text/plain,application/mpegurl">
            </label>
            <button id="processFileBtn" class="fetch-file-btn">📡 جلب القنوات من الملف</button>
            <span style="font-size:13px; color:#94a3b8;">(يدعم M3U وملفات النص العادي)</span>
        </div>
    </div>

    <div id="categoriesPanel" class="card" style="display:none;">
        <div><strong>📂 اختر التصنيف (من Xtream):</strong></div>
        <div id="categoryButtons" class="category-buttons"></div>
        <hr>
        <div id="linksArea">
            <textarea id="linksTextarea" readonly placeholder="اضغط على أي تصنيف لعرض الروابط... أو اختر ملفاً ثم اضغط 'جلب القنوات من الملف'"></textarea>
            <button id="copyAllBtn" class="copy-all-btn" style="display:none;">📋 نسخ كل النص</button>
        </div>
    </div>
</div>

<script>
    // متغيرات عامة
    let liveChannels = [];
    let categories = [];
    let serverBase = "";
    let usernameVal = "";
    let passwordVal = "";
    let uploadedFileContent = null;   // لتخزين محتوى الملف المرفوع مؤقتاً

    const serverInput = document.getElementById('serverUrl');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const fetchBtn = document.getElementById('fetchBtn');
    const categoriesPanel = document.getElementById('categoriesPanel');
    const categoryButtonsDiv = document.getElementById('categoryButtons');
    const linksTextarea = document.getElementById('linksTextarea');
    const copyAllBtn = document.getElementById('copyAllBtn');
    const connectionStatusDiv = document.getElementById('connectionStatus');
    const fileInput = document.getElementById('localFileInput');
    const processFileBtn = document.getElementById('processFileBtn');

    // دالة مساعدة للـ API
    async function apiCall(url) {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 15000);
        try {
            const res = await fetch(url, { signal: controller.signal });
            clearTimeout(timeout);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            return await res.json();
        } catch (e) {
            clearTimeout(timeout);
            throw e;
        }
    }

    async function getUserInfo(base, user, pass) {
        const url = `${base}/player_api.php?username=${encodeURIComponent(user)}&password=${encodeURIComponent(pass)}`;
        const data = await apiCall(url);
        if (data && data.user_info) return data;
        throw new Error("بيانات الدخول غير صحيحة");
    }

    async function fetchLiveCategories(base, user, pass) {
        const url = `${base}/player_api.php?username=${user}&password=${pass}&action=get_live_categories`;
        const data = await apiCall(url);
        return Array.isArray(data) ? data : [];
    }

    async function fetchLiveStreams(base, user, pass) {
        const url = `${base}/player_api.php?username=${user}&password=${pass}&action=get_live_streams`;
        const data = await apiCall(url);
        return Array.isArray(data) ? data : [];
    }

    function buildStreamUrl(streamId) {
        return `${serverBase}/live/${usernameVal}/${passwordVal}/${streamId}.ts`;
    }

    function renderCategoryButtons() {
        categoryButtonsDiv.innerHTML = '';
        const allBtn = document.createElement('button');
        allBtn.className = 'cat-btn';
        allBtn.innerText = '📺 جميع القنوات';
        allBtn.onclick = () => {
            activateButton(allBtn);
            showChannelsForCategory(null);
        };
        categoryButtonsDiv.appendChild(allBtn);

        categories.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = 'cat-btn';
            btn.innerText = cat.category_name;
            btn.onclick = () => {
                activateButton(btn);
                showChannelsForCategory(cat.category_id);
            };
            categoryButtonsDiv.appendChild(btn);
        });
    }

    function activateButton(activeBtn) {
        document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
        activeBtn.classList.add('active');
    }

    function showChannelsForCategory(catId) {
        let filtered = [];
        if (catId === null) {
            filtered = liveChannels;
        } else {
            filtered = liveChannels.filter(ch => ch.category_id == catId);
        }
        if (filtered.length === 0) {
            linksTextarea.value = "⚠️ لا توجد قنوات في هذا التصنيف.";
            copyAllBtn.style.display = 'none';
            return;
        }
        let lines = [];
        for (let ch of filtered) {
            const url = buildStreamUrl(ch.stream_id);
            lines.push(`${ch.name} || ${url}`);
        }
        linksTextarea.value = lines.join('\n');
        copyAllBtn.style.display = 'inline-block';
    }

    copyAllBtn.onclick = () => {
        navigator.clipboard.writeText(linksTextarea.value).then(() => {
            alert('✅ تم نسخ كل الروابط إلى الحافظة');
        }).catch(() => alert('تم النسخ (بديل)'));
    };

    async function fetchAllData() {
        let server = serverInput.value.trim();
        let user = usernameInput.value.trim();
        let pass = passwordInput.value.trim();
        if (!server || !user || !pass) {
            alert("يرجى ملء جميع الحقول");
            return;
        }
        if (server.endsWith('/')) server = server.slice(0, -1);
        serverBase = server;
        usernameVal = user;
        passwordVal = pass;

        fetchBtn.disabled = true;
        fetchBtn.innerText = '⏳ جاري الاتصال...';
        connectionStatusDiv.innerHTML = '';

        try {
            await getUserInfo(serverBase, usernameVal, passwordVal);
            categories = await fetchLiveCategories(serverBase, usernameVal, passwordVal);
            liveChannels = await fetchLiveStreams(serverBase, usernameVal, passwordVal);
            
            connectionStatusDiv.innerHTML = `<span style="color:#22c55e;">✅ متصل بنجاح - مرحباً ${usernameVal} | عدد القنوات: ${liveChannels.length} | مجموعات: ${categories.length}</span>`;
            categoriesPanel.style.display = 'block';
            renderCategoryButtons();
            const firstBtn = document.querySelector('.cat-btn');
            if (firstBtn) firstBtn.click();
        } catch (err) {
            connectionStatusDiv.innerHTML = `<span style="color:#ef4444;">❌ فشل: ${err.message}</span>`;
            categoriesPanel.style.display = 'none';
        } finally {
            fetchBtn.disabled = false;
            fetchBtn.innerText = '🔍 جلب البيانات';
        }
    }

    fetchBtn.onclick = fetchAllData;

    // حفظ البيانات المحفوظة
    if (localStorage.getItem('xtream_server')) serverInput.value = localStorage.getItem('xtream_server');
    if (localStorage.getItem('xtream_user')) usernameInput.value = localStorage.getItem('xtream_user');
    serverInput.onchange = () => localStorage.setItem('xtream_server', serverInput.value);
    usernameInput.onchange = () => localStorage.setItem('xtream_user', usernameInput.value);

    // قراءة الملف عند اختياره (تخزين المحتوى مؤقتاً)
    fileInput.addEventListener('change', function(event) {
        const file = event.target.files[0];
        if (!file) {
            uploadedFileContent = null;
            return;
        }
        const reader = new FileReader();
        reader.onload = function(e) {
            uploadedFileContent = e.target.result;
            // لا نعرضه مباشرة، ننتظر الضغط على زر "جلب القنوات"
            connectionStatusDiv.innerHTML = `<span style="color:#3b82f6;">📁 تم تحميل الملف: ${file.name} - اضغط "جلب القنوات من الملف" لعرض القنوات</span>`;
        };
        reader.onerror = function() {
            uploadedFileContent = null;
            connectionStatusDiv.innerHTML = `<span style="color:#ef4444;">❌ خطأ في قراءة الملف</span>`;
        };
        reader.readAsText(file, 'UTF-8');
    });

    // دالة لاستخراج القنوات من ملف M3U أو نص عادي
    function parseM3UOrText(content) {
        const lines = content.split(/\r?\n/);
        const channels = [];
        let currentName = "";
        for (let i = 0; i < lines.length; i++) {
            let line = lines[i].trim();
            if (line.startsWith("#EXTINF:")) {
                // استخراج اسم القناة: عادة بعد آخر فاصلة
                const commaIndex = line.lastIndexOf(',');
                if (commaIndex !== -1) {
                    currentName = line.substring(commaIndex + 1).trim();
                } else {
                    currentName = "قناة بدون اسم";
                }
                // قد يكون السطر التالي هو الرابط
                if (i + 1 < lines.length && !lines[i+1].startsWith("#")) {
                    let url = lines[i+1].trim();
                    if (url.startsWith("http")) {
                        channels.push({ name: currentName, url: url });
                        i++; // تخطي سطر الرابط
                        currentName = "";
                    }
                }
            } else if (line.startsWith("http")) {
                // في حالة نص عادي كل سطر فيه رابط فقط
                let url = line;
                let name = `قناة ${channels.length + 1}`;
                channels.push({ name: name, url: url });
            } else if (line.includes("||")) {
                // تنسيق "الاسم || الرابط" مباشر
                let parts = line.split("||");
                if (parts.length >= 2) {
                    channels.push({ name: parts[0].trim(), url: parts[1].trim() });
                }
            }
        }
        return channels;
    }

    // زر معالجة الملف وعرض القنوات
    processFileBtn.onclick = () => {
        if (!uploadedFileContent) {
            alert("يرجى اختيار ملف أولاً");
            return;
        }
        const channels = parseM3UOrText(uploadedFileContent);
        if (channels.length === 0) {
            linksTextarea.value = "⚠️ لم يتم العثور على قنوات في الملف. تأكد من أنه بصيغة M3U أو يحتوي على روابط HTTP.";
            copyAllBtn.style.display = 'none';
            return;
        }
        // عرض بنفس التنسيق: الاسم || الرابط
        let lines = channels.map(ch => `${ch.name} || ${ch.url}`);
        linksTextarea.value = lines.join('\n');
        copyAllBtn.style.display = 'inline-block';
        // إلغاء التحديد من أزرار التصنيفات (لأن المحتوى الآن من ملف)
        document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
        connectionStatusDiv.innerHTML = `<span style="color:#22c55e;">✅ تم استخراج ${channels.length} قناة من الملف</span>`;
    };
</script>
</body>
</html>
