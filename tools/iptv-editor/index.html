<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📋 مستخرج روابط IPTV – خفيف وبسيط + ملف مع تصنيفات</title>
    <style>
        body {
            background: #0b1120;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            padding: 20px;
            color: #e2e8f0;
        }
        .container {
            max-width: 1000px;
            margin: auto;
        }
        .card {
            background: #1e293b;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        input, button {
            background: #0f172a;
            border: 1px solid #334155;
            padding: 10px 15px;
            border-radius: 40px;
            color: white;
            font-size: 14px;
        }
        button {
            background: #3b82f6;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        button:hover {
            background: #2563eb;
        }
        .flex {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
            align-items: center;
        }
        .category-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 15px 0;
        }
        .cat-btn {
            background: #334155;
            border: none;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 13px;
        }
        .cat-btn.active {
            background: #3b82f6;
        }
        textarea {
            width: 100%;
            height: 400px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 16px;
            color: #cbd5e6;
            padding: 15px;
            font-family: monospace;
            font-size: 13px;
            direction: ltr;
            text-align: left;
            resize: vertical;
        }
        .copy-all-btn {
            background: #10b981;
            margin-top: 10px;
        }
        .stats {
            font-size: 14px;
            color: #94a3b8;
        }
        hr {
            border-color: #334155;
        }
        .file-row {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .file-label {
            background: #2d3748;
            padding: 8px 18px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }
        .file-label:hover {
            background: #4a5568;
        }
        input[type="file"] {
            display: none;
        }
        .fetch-file-btn {
            background: #f59e0b;
        }
        .fetch-file-btn:hover {
            background: #d97706;
        }
        .separator {
            margin: 15px 0;
            border-top: 1px solid #334155;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h2>📡 مستخرج روابط Xtream Codes <span style="font-size:14px;">(نسخ جماعي للمجموعات)</span></h2>
        <div class="flex">
            <input type="text" id="serverUrl" placeholder="http://cf.aminera.xyz:80" dir="ltr">
            <input type="text" id="username" placeholder="UN56WA7" dir="ltr">
            <input type="password" id="password" placeholder="Y6P6326" dir="ltr">
            <button id="fetchBtn">🔍 جلب البيانات</button>
        </div>
        <div id="connectionStatus" class="stats"></div>
    </div>

    <!-- رفع الملف ومعالجته -->
    <div class="card">
        <div class="file-row">
            <label class="file-label">
                📂 اختيار ملف من جهازك
                <input type="file" id="localFileInput" accept=".txt,.m3u,.csv,text/plain,application/mpegurl">
            </label>
            <button id="processFileBtn" class="fetch-file-btn">📡 جلب القنوات من الملف</button>
            <span style="font-size:13px; color:#94a3b8;">(يدعم M3U مع group-title)</span>
        </div>
    </div>

    <!-- لوحة تصنيفات الملف (تظهر فقط بعد معالجة ملف) -->
    <div id="fileCategoriesPanel" class="card" style="display:none;">
        <div><strong>📂 تصنيفات الملف:</strong></div>
        <div id="fileCategoryButtons" class="category-buttons"></div>
        <div class="separator"></div>
        <div id="linksArea">
            <textarea id="linksTextarea" readonly placeholder="اختر تصنيفاً من الملف أو من Xtream"></textarea>
            <button id="copyAllBtn" class="copy-all-btn" style="display:none;">📋 نسخ كل النص</button>
        </div>
    </div>

    <!-- لوحة تصنيفات Xtream (تظهر فقط بعد جلب بيانات Xtream) -->
    <div id="xtreamCategoriesPanel" class="card" style="display:none;">
        <div><strong>📂 تصنيفات Xtream:</strong></div>
        <div id="xtreamCategoryButtons" class="category-buttons"></div>
    </div>
</div>

<script>
    // ---------- متغيرات عامة ----------
    let liveChannels = [];          // قنوات Xtream
    let xtreamCategories = [];      // تصنيفات Xtream
    let serverBase = "";
    let usernameVal = "";
    let passwordVal = "";

    // بيانات الملف
    let fileChannels = [];          // { name, url, groupTitle }
    let fileGroups = new Map();     // groupTitle -> list of channels

    // عناصر DOM
    const serverInput = document.getElementById('serverUrl');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const fetchBtn = document.getElementById('fetchBtn');
    const xtreamCategoriesPanel = document.getElementById('xtreamCategoriesPanel');
    const xtreamCategoryButtonsDiv = document.getElementById('xtreamCategoryButtons');
    const fileCategoriesPanel = document.getElementById('fileCategoriesPanel');
    const fileCategoryButtonsDiv = document.getElementById('fileCategoryButtons');
    const linksTextarea = document.getElementById('linksTextarea');
    const copyAllBtn = document.getElementById('copyAllBtn');
    const connectionStatusDiv = document.getElementById('connectionStatus');
    const fileInput = document.getElementById('localFileInput');
    const processFileBtn = document.getElementById('processFileBtn');

    let uploadedFileContent = null;

    // ---------- دوال مساعدة للـ API (Xtream) ----------
    async function apiCall(url) {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 15000);
        try {
            const res = await fetch(url, { signal: controller.signal });
            clearTimeout(timeout);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            return await res.json();
        } catch (e) {
            clearTimeout(timeout);
            throw e;
        }
    }

    async function getUserInfo(base, user, pass) {
        const url = `${base}/player_api.php?username=${encodeURIComponent(user)}&password=${encodeURIComponent(pass)}`;
        const data = await apiCall(url);
        if (data && data.user_info) return data;
        throw new Error("بيانات الدخول غير صحيحة");
    }

    async function fetchLiveCategories(base, user, pass) {
        const url = `${base}/player_api.php?username=${user}&password=${pass}&action=get_live_categories`;
        const data = await apiCall(url);
        return Array.isArray(data) ? data : [];
    }

    async function fetchLiveStreams(base, user, pass) {
        const url = `${base}/player_api.php?username=${user}&password=${pass}&action=get_live_streams`;
        const data = await apiCall(url);
        return Array.isArray(data) ? data : [];
    }

    function buildStreamUrl(streamId) {
        return `${serverBase}/live/${usernameVal}/${passwordVal}/${streamId}.ts`;
    }

    // عرض القنوات في textarea (عام)
    function displayChannels(channelsArray) {
        if (!channelsArray || channelsArray.length === 0) {
            linksTextarea.value = "⚠️ لا توجد قنوات لعرضها.";
            copyAllBtn.style.display = 'none';
            return;
        }
        let lines = channelsArray.map(ch => `${ch.name} || ${ch.url}`);
        linksTextarea.value = lines.join('\n');
        copyAllBtn.style.display = 'inline-block';
    }

    // ---------- دوال Xtream ----------
    function renderXtreamCategoryButtons() {
        xtreamCategoryButtonsDiv.innerHTML = '';
        const allBtn = document.createElement('button');
        allBtn.className = 'cat-btn';
        allBtn.innerText = '📺 جميع القنوات (Xtream)';
        allBtn.onclick = () => {
            activateButton(allBtn, 'xtream');
            let allChannels = liveChannels.map(ch => ({ name: ch.name, url: buildStreamUrl(ch.stream_id) }));
            displayChannels(allChannels);
        };
        xtreamCategoryButtonsDiv.appendChild(allBtn);

        xtreamCategories.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = 'cat-btn';
            btn.innerText = cat.category_name;
            btn.onclick = () => {
                activateButton(btn, 'xtream');
                let filtered = liveChannels.filter(ch => ch.category_id == cat.category_id);
                let chs = filtered.map(ch => ({ name: ch.name, url: buildStreamUrl(ch.stream_id) }));
                displayChannels(chs);
            };
            xtreamCategoryButtonsDiv.appendChild(btn);
        });
    }

    // ---------- دوال الملف (مع group-title) ----------
    function parseM3UWithGroups(content) {
        const lines = content.split(/\r?\n/);
        const channels = [];    // { name, url, groupTitle }
        let currentGroup = "عام";
        let currentName = "";

        for (let i = 0; i < lines.length; i++) {
            let line = lines[i].trim();
            if (line.startsWith("#EXTINF:")) {
                // استخراج group-title إن وجد
                let groupMatch = line.match(/group-title="([^"]*)"/i);
                if (groupMatch && groupMatch[1]) {
                    currentGroup = groupMatch[1];
                } else {
                    currentGroup = "عام";
                }
                // استخراج الاسم بعد آخر فاصلة
                let commaIndex = line.lastIndexOf(',');
                if (commaIndex !== -1) {
                    currentName = line.substring(commaIndex + 1).trim();
                } else {
                    currentName = "قناة بدون اسم";
                }
                // الرابط في السطر التالي
                if (i + 1 < lines.length && !lines[i+1].startsWith("#")) {
                    let url = lines[i+1].trim();
                    if (url.startsWith("http")) {
                        channels.push({ name: currentName, url: url, groupTitle: currentGroup });
                        i++;
                        currentName = "";
                    }
                }
            } else if (line.startsWith("http") && !line.startsWith("#")) {
                // ملف نصي عادي: كل سطر رابط
                let url = line;
                let name = `قناة ${channels.length + 1}`;
                channels.push({ name: name, url: url, groupTitle: "عام" });
            } else if (line.includes("||")) {
                // تنسيق الاسم || الرابط
                let parts = line.split("||");
                if (parts.length >= 2) {
                    channels.push({ name: parts[0].trim(), url: parts[1].trim(), groupTitle: "عام" });
                }
            }
        }
        return channels;
    }

    // بناء أزرار التصنيفات من الملف
    function buildFileCategoryButtons(channels) {
        const groupsMap = new Map();
        channels.forEach(ch => {
            let group = ch.groupTitle || "عام";
            if (!groupsMap.has(group)) groupsMap.set(group, []);
            groupsMap.get(group).push(ch);
        });
        fileGroups = groupsMap;

        fileCategoryButtonsDiv.innerHTML = '';
        const allBtn = document.createElement('button');
        allBtn.className = 'cat-btn';
        allBtn.innerText = '📺 جميع القنوات (الملف)';
        allBtn.onclick = () => {
            activateButton(allBtn, 'file');
            let allChs = [];
            for (let chs of fileGroups.values()) allChs.push(...chs);
            displayChannels(allChs);
        };
        fileCategoryButtonsDiv.appendChild(allBtn);

        for (let [groupName, chs] of fileGroups.entries()) {
            const btn = document.createElement('button');
            btn.className = 'cat-btn';
            btn.innerText = groupName;
            btn.onclick = () => {
                activateButton(btn, 'file');
                displayChannels(chs);
            };
            fileCategoryButtonsDiv.appendChild(btn);
        }
    }

    function activateButton(activeBtn, source) {
        // إلغاء تنشيط جميع الأزرار في كلا القسمين
        document.querySelectorAll('#xtreamCategoryButtons .cat-btn, #fileCategoryButtons .cat-btn').forEach(btn => btn.classList.remove('active'));
        activeBtn.classList.add('active');
    }

    // ---------- جلب بيانات Xtream ----------
    async function fetchAllData() {
        let server = serverInput.value.trim();
        let user = usernameInput.value.trim();
        let pass = passwordInput.value.trim();
        if (!server || !user || !pass) {
            alert("يرجى ملء جميع الحقول");
            return;
        }
        if (server.endsWith('/')) server = server.slice(0, -1);
        serverBase = server;
        usernameVal = user;
        passwordVal = pass;

        fetchBtn.disabled = true;
        fetchBtn.innerText = '⏳ جاري الاتصال...';
        connectionStatusDiv.innerHTML = '';

        try {
            await getUserInfo(serverBase, usernameVal, passwordVal);
            xtreamCategories = await fetchLiveCategories(serverBase, usernameVal, passwordVal);
            liveChannels = await fetchLiveStreams(serverBase, usernameVal, passwordVal);
            
            connectionStatusDiv.innerHTML = `<span style="color:#22c55e;">✅ متصل بنجاح | عدد القنوات: ${liveChannels.length} | مجموعات: ${xtreamCategories.length}</span>`;
            xtreamCategoriesPanel.style.display = 'block';
            renderXtreamCategoryButtons();
            // عرض جميع القنوات تلقائياً
            let allChannels = liveChannels.map(ch => ({ name: ch.name, url: buildStreamUrl(ch.stream_id) }));
            displayChannels(allChannels);
            const firstBtn = document.querySelector('#xtreamCategoryButtons .cat-btn');
            if (firstBtn) firstBtn.classList.add('active');
        } catch (err) {
            connectionStatusDiv.innerHTML = `<span style="color:#ef4444;">❌ فشل: ${err.message}</span>`;
            xtreamCategoriesPanel.style.display = 'none';
        } finally {
            fetchBtn.disabled = false;
            fetchBtn.innerText = '🔍 جلب البيانات';
        }
    }

    fetchBtn.onclick = fetchAllData;

    // حفظ بيانات Xtream
    if (localStorage.getItem('xtream_server')) serverInput.value = localStorage.getItem('xtream_server');
    if (localStorage.getItem('xtream_user')) usernameInput.value = localStorage.getItem('xtream_user');
    serverInput.onchange = () => localStorage.setItem('xtream_server', serverInput.value);
    usernameInput.onchange = () => localStorage.setItem('xtream_user', usernameInput.value);

    // ---------- معالجة الملف ----------
    fileInput.addEventListener('change', function(event) {
        const file = event.target.files[0];
        if (!file) {
            uploadedFileContent = null;
            return;
        }
        const reader = new FileReader();
        reader.onload = function(e) {
            uploadedFileContent = e.target.result;
            connectionStatusDiv.innerHTML = `<span style="color:#3b82f6;">📁 تم تحميل الملف: ${file.name} - اضغط "جلب القنوات من الملف"</span>`;
        };
        reader.onerror = function() {
            uploadedFileContent = null;
            connectionStatusDiv.innerHTML = `<span style="color:#ef4444;">❌ خطأ في قراءة الملف</span>`;
        };
        reader.readAsText(file, 'UTF-8');
    });

    processFileBtn.onclick = () => {
        if (!uploadedFileContent) {
            alert("يرجى اختيار ملف أولاً");
            return;
        }
        const channels = parseM3UWithGroups(uploadedFileContent);
        if (channels.length === 0) {
            linksTextarea.value = "⚠️ لم يتم العثور على قنوات في الملف.";
            copyAllBtn.style.display = 'none';
            fileCategoriesPanel.style.display = 'none';
            return;
        }
        fileChannels = channels;
        buildFileCategoryButtons(fileChannels);
        fileCategoriesPanel.style.display = 'block';
        // عرض جميع القنوات
        let allChs = [];
        for (let chs of fileGroups.values()) allChs.push(...chs);
        displayChannels(allChs);
        // تفعيل زر الكل
        const allFileBtn = document.querySelector('#fileCategoryButtons .cat-btn:first-child');
        if (allFileBtn) allFileBtn.classList.add('active');
        connectionStatusDiv.innerHTML = `<span style="color:#22c55e;">✅ تم استخراج ${channels.length} قناة و ${fileGroups.size} تصنيف من الملف</span>`;
    };

    // نسخ النص
    copyAllBtn.onclick = () => {
        navigator.clipboard.writeText(linksTextarea.value).then(() => {
            alert('✅ تم نسخ كل الروابط إلى الحافظة');
        }).catch(() => alert('تم النسخ (بديل)'));
    };
</script>
</body>
</html>
