<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV Checker - فحص سيرفرات IPTV</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #f4f4f4; }
        input, button { margin: 10px; padding: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid black; padding: 10px; text-align: center; }
        .working { color: green; font-weight: bold; }
        .not-working { color: red; font-weight: bold; }
        video { width: 100%; max-width: 500px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <h2>🔍 فحص سيرفرات IPTV (IPTV Checker)</h2>
    
    <input type="file" id="fileInput">
    <input type="text" id="m3uUrl" placeholder="🔗 أدخل رابط M3U">
    <button onclick="loadM3U()">📂 تحميل وفحص</button>
    <button onclick="exportWorkingChannels()">📥 تنزيل القنوات الشغالة</button>
    <button onclick="filterWorkingChannels()">✅ تصفية القنوات الشغالة</button>
    <input type="text" id="searchBox" onkeyup="searchChannels()" placeholder="🔍 البحث عن قناة">
    <label>⏳ فحص تلقائي كل <input type="number" id="autoRefreshTime" value="5" min="1"> دقيقة</label>
    <button onclick="startAutoRefresh()">🔄 تشغيل الفحص التلقائي</button>

    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>اسم القناة</th>
                <th>الرابط</th>
                <th>الجودة</th>
                <th>الدولة</th>
                <th>الحالة</th>
                <th>🎥 تشغيل</th>
                <th>✏ تعديل</th>
                <th>📋 نسخ</th>
            </tr>
        </thead>
        <tbody id="channelList"></tbody>
    </table>

    <video id="videoPlayer" controls></video>

    <script>
        let channels = [];
        let autoRefreshInterval;

        function fetchM3U() {
    let url = document.getElementById("m3uUrl").value.trim();
    if (!url) {
        alert("⚠️ الرجاء إدخال رابط M3U صحيح!");
        return;
    }

    let xhr = new XMLHttpRequest();
    xhr.open("GET", url, true);
    xhr.onreadystatechange = function () {
        if (xhr.readyState === 4) {
            if (xhr.status === 200) {
                processM3U(xhr.responseText);
            } else {
                alert("❌ خطأ في تحميل الملف: " + xhr.status);
            }
        }
    };
    xhr.send();
}

        function parseM3U(m3uContent) {
            const lines = m3uContent.split("\n");
            let parsedChannels = [];
            let currentChannel = {};

            for (let i = 0; i < lines.length; i++) {
                let line = lines[i].trim();

                if (line.startsWith("#EXTINF")) {
                    let nameMatch = line.match(/,(.+)$/);
                    if (nameMatch) {
                        currentChannel.name = nameMatch[1];
                    }
                    let qualityMatch = line.match(/tvg-logo="(.+?)"/);
                    currentChannel.quality = qualityMatch ? "HD" : "SD";
                } else if (line && !line.startsWith("#")) {
                    currentChannel.url = line;
                    parsedChannels.push({ ...currentChannel });
                    currentChannel = {};
                }
            }
            return parsedChannels;
        }

        async function checkChannel(url) {
            try {
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 5000);
                const response = await fetch(url, { method: "HEAD", signal: controller.signal });
                clearTimeout(timeout);
                return response.ok;
            } catch {
                return false;
            }
        }

        async function loadM3U() {
            let m3uData = "";
            const fileInput = document.getElementById("fileInput").files[0];
            const m3uUrl = document.getElementById("m3uUrl").value;

            if (fileInput) {
                const reader = new FileReader();
                reader.onload = async function (e) {
                    m3uData = e.target.result;
                    await processM3U(m3uData);
                };
                reader.readAsText(fileInput);
            } else if (m3uUrl) {
                m3uData = await fetchM3U(m3uUrl);
                if (m3uData) {
                    await processM3U(m3uData);
                }
            } else {
                alert("⚠️ يرجى إدخال رابط M3U أو تحميل ملف.");
            }
        }

        async function processM3U(m3uData) {
            channels = parseM3U(m3uData);
            let tableBody = document.getElementById("channelList");
            tableBody.innerHTML = "";

            for (let i = 0; i < channels.length; i++) {
                let channel = channels[i];
                let row = document.createElement("tr");

                row.innerHTML = `
                    <td>${i + 1}</td>
                    <td>${channel.name || "غير معروف"}</td>
                    <td><a href="${channel.url}" target="_blank">🔗 رابط القناة</a></td>
                    <td>${channel.quality}</td>
                    <td>🇺🇳 غير معروف</td>
                    <td class="status">🔍 جاري الفحص...</td>
                    <td><button onclick="playChannel('${channel.url}')">▶ تشغيل</button></td>
                    <td><button onclick="editChannel(${i})">✏ تعديل</button></td>
                    <td><button onclick="copyChannel('${channel.url}')">📋 نسخ</button></td>
                `;

                tableBody.appendChild(row);

                checkChannel(channel.url).then(isWorking => {
                    row.querySelector(".status").textContent = isWorking ? "✅ تعمل" : "❌ لا تعمل";
                    row.querySelector(".status").className = isWorking ? "working" : "not-working";
                    channel.status = isWorking ? "✅ تعمل" : "❌ لا تعمل";
                });
            }
        }

        function playChannel(url) {
            let videoPlayer = document.getElementById("videoPlayer");
            videoPlayer.src = url;
            videoPlayer.style.display = "block";
            videoPlayer.play();
        }
    </script>

</body>
</html>
