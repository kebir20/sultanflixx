<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>M3U Generator</title>
</head>

<body style="background:black;color:white;text-align:center">

<h2>M3U Generator</h2>

<textarea id="input" style="width:90%;height:200px"></textarea>

<br><br>

<button onclick="generate()">Generate</button>

<script>

function generate(){

let lines=document.getElementById("input").value.split("\n")

let m3u="#EXTM3U\n"

lines.forEach(url=>{

m3u+=`#EXTINF:-1,Channel\n${url}\n`

})

let blob=new Blob([m3u])

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="playlist.m3u"

a.click()

}

</script>

</body>
</html>
