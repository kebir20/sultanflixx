<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>IPTV Speed Test</title>
</head>

<body style="background:black;color:white;text-align:center">

<h2>IPTV Speed Test</h2>

<input id="url" placeholder="Stream URL">

<button onclick="test()">Test</button>

<p id="result"></p>

<script>

async function test(){

let url=document.getElementById("url").value

let start=Date.now()

try{

await fetch(url,{method:"HEAD"})

let speed=Date.now()-start

document.getElementById("result").innerText="Speed "+speed+" ms"

}catch{

document.getElementById("result").innerText="Stream Offline"

}

}

</script>

</body>
</html>
