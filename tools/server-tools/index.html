<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>IPTV Analyzer PRO</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
padding:20px;
}

header{
text-align:center;
font-size:24px;
margin-bottom:20px;
}

.controls{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:15px;
}

button,input{
padding:10px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center;
}

th{
background:#007bff;
color:white;
}

.logo{
width:40px;
}

.status-ok{
color:green;
font-weight:bold;
}

.status-dead{
color:red;
font-weight:bold;
}

video{
width:100%;
max-width:800px;
margin-top:20px;
}

</style>

</head>

<body>

<header>🚀 IPTV Analyzer PRO</header>

<div class="controls">

<input type="file" id="fileInput">

<input type="text" id="urlInput" placeholder="M3U URL">

<button onclick="loadM3U()">Load</button>

<button onclick="scanChannels()">Scan</button>

<button onclick="removeDuplicates()">Remove duplicates</button>

<button onclick="exportM3U()">Export working</button>

<button onclick="mergeM3U()">Merge lists</button>

<button onclick="xtreamToM3U()">Xtream → M3U</button>

<input type="text" id="search" placeholder="Search">

</div>

<table>

<thead>

<tr>

<th>#</th>
<th>Logo</th>
<th>Name</th>
<th>Group</th>
<th>Server</th>
<th>Type</th>
<th>Ping</th>
<th>Status</th>
<th>Play</th>

</tr>

</thead>

<tbody id="channels"></tbody>

</table>

<video id="player" controls></video>

<script>

let channels=[]

function parseM3U(text){

let lines=text.split("\n")

let list=[]

let temp={}

for(let line of lines){

line=line.trim()

if(line.startsWith("#EXTINF")){

let name=line.split(",").pop()

let logo=line.match(/tvg-logo="(.+?)"/)

let group=line.match(/group-title="(.+?)"/)

temp.name=name
temp.logo=logo?logo[1]:""
temp.group=group?group[1]:"Other"

}

else if(line && !line.startsWith("#")){

temp.url=line

temp.server=getServer(line)

temp.type=detectType(line)

list.push({...temp})

temp={}

}

}

return list

}

function detectType(url){

if(url.includes(".m3u8")) return "HLS"

if(url.includes(".ts")) return "TS"

if(url.includes("rtmp")) return "RTMP"

return "Stream"

}

function getServer(url){

try{

let u=new URL(url)

return u.hostname

}catch{

return "-"

}

}

async function loadM3U(){

let file=document.getElementById("fileInput").files[0]

let url=document.getElementById("urlInput").value

if(file){

let reader=new FileReader()

reader.onload=e=>{

channels=parseM3U(e.target.result)

render()

}

reader.readAsText(file)

}

else if(url){

let res=await fetch(url)

let txt=await res.text()

channels=parseM3U(txt)

render()

}

}

function render(){

let table=document.getElementById("channels")

table.innerHTML=""

channels.forEach((c,i)=>{

let row=document.createElement("tr")

row.innerHTML=`

<td>${i+1}</td>

<td>${c.logo?`<img src="${c.logo}" class="logo">`:""}</td>

<td>${c.name}</td>

<td>${c.group}</td>

<td>${c.server}</td>

<td>${c.type}</td>

<td class="ping">-</td>

<td class="status">⏳</td>

<td><button onclick="play('${c.url}')">▶</button></td>

`

table.appendChild(row)

})

}

async function ping(url){

let start=performance.now()

try{

await fetch(url,{method:"HEAD"})

return Math.round(performance.now()-start)

}catch{

return null

}

}

async function check(url){

try{

let controller=new AbortController()

setTimeout(()=>controller.abort(),4000)

let r=await fetch(url,{method:"HEAD",signal:controller.signal})

return r.ok

}catch{

return false

}

}

async function scanChannels(){

let rows=document.querySelectorAll("#channels tr")

let batchSize=40

for(let i=0;i<channels.length;i+=batchSize){

let batch=channels.slice(i,i+batchSize)

let promises=batch.map(c=>check(c.url))

let results=await Promise.all(promises)

results.forEach((ok,index)=>{

let rowIndex=i+index

let statusCell=rows[rowIndex].querySelector(".status")

if(ok){

statusCell.innerHTML="✅"
statusCell.className="status-ok"

}else{

statusCell.innerHTML="❌"
statusCell.className="status-dead"

}

})

}

}

function play(url){

let video=document.getElementById("player")

if(Hls.isSupported()){

let hls=new Hls()

hls.loadSource(url)

hls.attachMedia(video)

hls.on(Hls.Events.MANIFEST_PARSED,function(){

video.play()

})

}else{

video.src=url

video.play()

}

}

function removeDuplicates(){

let seen=new Set()

channels=channels.filter(c=>{

if(seen.has(c.url)) return false

seen.add(c.url)

return true

})

render()

}

function exportM3U(){

let data="#EXTM3U\n"

channels.forEach(c=>{

data+=`#EXTINF:-1,${c.name}\n${c.url}\n`

})

let blob=new Blob([data])

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="channels.m3u"

a.click()

}

function mergeM3U(){

alert("قم بتحميل قائمة ثانية وسيتم دمجها تلقائياً")

}

function xtreamToM3U(){

let server=prompt("Xtream server")

let user=prompt("username")

let pass=prompt("password")

let url=`${server}/get.php?username=${user}&password=${pass}&type=m3u`

document.getElementById("urlInput").value=url

alert("تم تحويل Xtream الى M3U")

}

</script>

</body>
</html>
