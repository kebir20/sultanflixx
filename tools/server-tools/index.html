<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>IPTV Player</title>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:sans-serif;
overflow:hidden;
}

video{
width:100%;
height:100vh;
background:#000;
object-fit:contain;
}

.controls{
position:absolute;
bottom:10px;
left:0;
right:0;
display:flex;
justify-content:center;
gap:6px;
background:rgba(0,0,0,.5);
padding:10px;
border-radius:12px;
}

button{
background:#222;
color:#fff;
border:none;
padding:8px;
border-radius:6px;
cursor:pointer;
}

.channel-list{
position:absolute;
top:0;
right:0;
bottom:0;
width:260px;
background:rgba(0,0,0,.8);
overflow-y:auto;
display:none;
}

.channel-list.show{
display:block;
}

.channel-item{
padding:8px;
border-bottom:1px solid #333;
cursor:pointer;
}

.channel-item:hover{
background:#444;
}

.channel-item.selected{
background:#007bff;
}

.overlay{
position:absolute;
top:10px;
left:10px;
background:rgba(0,0,0,.6);
padding:6px 10px;
border-radius:6px;
}
</style>
</head>

<body>

<video id="video" controls autoplay></video>

<div class="overlay" id="overlay">IPTV</div>

<div class="controls">
<button id="toggleList">📺 القنوات</button>
<button id="prev">⏮</button>
<button id="next">⏭</button>
<button id="random">🎲</button>
<button id="mute">🔊</button>
<button id="fullscreen">⛶</button>
</div>

<div class="channel-list" id="channelList"></div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>

const M3U_URL="https://thetivi.us/M3U/m3u2/playlist_ken1980_plus.m3u"; // ملف القنوات

const video=document.getElementById("video");
const list=document.getElementById("channelList");
const overlay=document.getElementById("overlay");

let channels=[];
let current=0;
let hls;

fetch(M3U_URL)
.then(r=>r.text())
.then(parseM3U);

function parseM3U(data){

const lines=data.split("\n");

for(let i=0;i<lines.length;i++){

if(lines[i].startsWith("#EXTINF")){

const name=lines[i].split(",")[1].trim();
const url=lines[i+1].trim();

channels.push({name,url});

}

}

renderChannels();

playChannel(0);

}

function renderChannels(){

channels.forEach((ch,i)=>{

const div=document.createElement("div");
div.className="channel-item";
div.textContent=ch.name;

div.onclick=()=>playChannel(i);

list.appendChild(div);

});

}

function playChannel(i){

current=i;

const ch=channels[i];

overlay.textContent=ch.name;

document.querySelectorAll(".channel-item")
.forEach(e=>e.classList.remove("selected"));

document.querySelectorAll(".channel-item")[i].classList.add("selected");

if(hls) hls.destroy();

if(Hls.isSupported()){

hls=new Hls();

hls.loadSource(ch.url);

hls.attachMedia(video);

}else{

video.src=ch.url;

}

video.play();

}

document.getElementById("toggleList").onclick=()=>{

list.classList.toggle("show");

}

document.getElementById("next").onclick=()=>{

playChannel((current+1)%channels.length);

}

document.getElementById("prev").onclick=()=>{

playChannel((current-1+channels.length)%channels.length);

}

document.getElementById("random").onclick=()=>{

playChannel(Math.floor(Math.random()*channels.length));

}

document.getElementById("mute").onclick=()=>{

video.muted=!video.muted;

}

document.getElementById("fullscreen").onclick=()=>{

if(!document.fullscreenElement)
document.documentElement.requestFullscreen();
else
document.exitFullscreen();

}

</script>

</body>
</html>
