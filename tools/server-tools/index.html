.modal-box button{background:#ffc107}
.cancel{background:#444!important;color:#fff!important}

let channels=[]
let selectedCategory=""
let favorites=JSON.parse(localStorage.getItem("favorites")||"[]")
let selectedLink=""
let currentIndex=0

function parseM3U(text){

const lines=text.split("\n")
const list=[]

for(let i=0;i<lines.length;i++){

if(lines[i].startsWith("#EXTINF")){

const logo=lines[i].match(/tvg-logo="(.*?)"/)?.[1]||""
const group=lines[i].match(/group-title="(.*?)"/)?.[1]||"غير مصنف"
const name=lines[i].split(",")[1]?.trim()||"بدون اسم"
const link=lines[i+1]?.trim()

if(link)list.push({name,logo,group,link})

}

}

return list
}

function updateCategories(){

const cats=[...new Set(channels.map(c=>c.group))]

const box=document.getElementById("categoryList")

box.innerHTML=""

const all=document.createElement("div")
all.textContent="الكل"
all.className="category-btn"
all.onclick=()=>{selectedCategory="";filterChannels()}
box.appendChild(all)

cats.forEach(cat=>{

const btn=document.createElement("div")
btn.textContent=cat
btn.className="category-btn"
btn.onclick=()=>{selectedCategory=cat;filterChannels()}
box.appendChild(btn)

})

}

function toggleSearch(){

const el=document.getElementById("searchInput")
el.style.display=el.style.display==="none"?"block":"none"

}

function filterChannels(){

const search=document.getElementById("searchInput").value.toLowerCase()
const list=document.getElementById("channelList")

list.innerHTML=""

let filtered=channels.filter(c=>
(!selectedCategory||c.group===selectedCategory)&&
(!search||c.name.toLowerCase().includes(search))
)

filtered.forEach((c,i)=>{

const favIcon=favorites.includes(c.link)?"❤️":"🤍"

const item=document.createElement("div")
item.className="channel"

item.innerHTML=`
<img src="${c.logo}">
<span>${c.name}</span>
<span class="fav">${favIcon}</span>
`

item.onclick=()=>openChannel(c.link,i)

item.querySelector(".fav").onclick=(e)=>{
e.stopPropagation()
toggleFavorite(c.link)
}

list.appendChild(item)

})

document.getElementById("channelCount").textContent=`${filtered.length} قناة`

}

function toggleFavorite(link){

if(favorites.includes(link)){
favorites=favorites.filter(f=>f!==link)
}else{
favorites.push(link)
}

localStorage.setItem("favorites",JSON.stringify(favorites))
filterChannels()

}

function showFavorites(){

const list=document.getElementById("channelList")
list.innerHTML=""

const favChannels=channels.filter(c=>favorites.includes(c.link))

favChannels.forEach(c=>{

const item=document.createElement("div")
item.className="channel"

item.innerHTML=`
<img src="${c.logo}">
<span>${c.name}</span>
`

item.onclick=()=>openChannel(c.link)

list.appendChild(item)

})

}

function openChannel(link,index){

selectedLink=link
currentIndex=index

localStorage.setItem("lastChannel",link)

document.getElementById("playerModal").style.display="flex"

}

function closeModal(){

document.getElementById("playerModal").style.display="none"

}

function startPlayer(player){

closeModal()

if(player==="web"){
playWeb(selectedLink)
return
}

const base=selectedLink.replace(/^https?:\/\//,"")

const players={

mx:`intent://${base}#Intent;package=com.mxtech.videoplayer.ad;type=video/*;scheme=http;end`,
vlc:`intent://${base}#Intent;package=org.videolan.vlc;type=video/*;scheme=http;end`,
just:`intent://${base}#Intent;package=com.brouken.player;type=video/*;scheme=http;end`,
nova:`intent://${base}#Intent;package=org.courville.nova;type=video/*;scheme=http;end`,
km:`intent://${base}#Intent;package=com.kmplayer;type=video/*;scheme=http;end`,
xplayer:`intent://${base}#Intent;package=video.player.videoplayer;type=video/*;scheme=http;end`

}

const iframe=document.createElement("iframe")
iframe.style.display="none"
iframe.src=players[player]

document.body.appendChild(iframe)

setTimeout(()=>iframe.remove(),1500)

}

function playWeb(link){

document.getElementById("channelList").style.display="none"

const container=document.getElementById("videoContainer")
const video=document.getElementById("webPlayer")

container.style.display="block"

video.src=link

}

function openBrowser(){

window.open(selectedLink)

}

function nextChannel(){

currentIndex++

if(currentIndex>=channels.length)currentIndex=0

openChannel(channels[currentIndex].link,currentIndex)

}

function prevChannel(){

currentIndex--

if(currentIndex<0)currentIndex=channels.length-1

openChannel(channels[currentIndex].link,currentIndex)

}

document.addEventListener("keydown",e=>{

if(e.key==="ArrowDown")nextChannel()
if(e.key==="ArrowUp")prevChannel()

})

function updateClock(){

const now=new Date()

document.getElementById("digitalClock").textContent=
now.toLocaleTimeString()

}

setInterval(updateClock,1000)

channels=parseM3U(m3uText)

updateCategories()

filterChannels()

</script>

</body>
</html>
