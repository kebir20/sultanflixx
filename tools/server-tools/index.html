<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>IPTV Checker PRO</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
transition:.3s;
}

.dark{
background:#0f0f0f;
color:white;
}

header{
background:#007bff;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.container{
max-width:1300px;
margin:auto;
padding:20px;
}

.controls{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:15px;
}

button,input{
padding:10px;
font-size:14px;
}

button{
background:#007bff;
border:none;
color:white;
cursor:pointer;
border-radius:4px;
}

button:hover{
background:#0056b3;
}

.stats{
display:flex;
gap:20px;
margin:10px 0;
font-weight:bold;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

.dark table{
background:#1c1c1c;
}

th,td{
padding:8px;
border:1px solid #ddd;
text-align:center;
}

th{
background:#007bff;
color:white;
}

.logo{
width:40px;
}

.status-ok{
color:lime;
font-weight:bold;
}

.status-dead{
color:red;
font-weight:bold;
}

video{
width:100%;
max-width:700px;
display:none;
margin-top:20px;
}

progress{
width:100%;
height:20px;
}

</style>

</head>

<body>

<header>🚀 IPTV Checker PRO</header>

<div class="container">

<div class="controls">

<input type="file" id="fileInput">

<input type="text" id="urlInput" placeholder="رابط M3U">

<button onclick="loadM3U()">تحميل</button>

<button onclick="scanChannels()">فحص</button>

<button onclick="filterWorking()">القنوات الشغالة</button>

<button onclick="removeDuplicates()">حذف المكرر</button>

<button onclick="exportM3U()">تصدير M3U</button>

<button onclick="toggleDark()">Dark</button>

<input type="text" id="search" placeholder="بحث..." onkeyup="searchChannel()">

</div>

<div class="stats">

<div>القنوات: <span id="total">0</span></div>
<div>الشغالة: <span id="working">0</span></div>
<div>الميتة: <span id="dead">0</span></div>

</div>

<progress id="progress" value="0" max="100"></progress>

<table>

<thead>

<tr>

<th>#</th>
<th>Logo</th>
<th>Channel</th>
<th>Group</th>
<th>Ping</th>
<th>Status</th>
<th>Play</th>
<th>Copy</th>

</tr>

</thead>

<tbody id="channels"></tbody>

</table>

<video id="player" controls></video>

</div>

<script>

let channels=[]

function toggleDark(){
document.body.classList.toggle("dark")
}

function parseM3U(text){

let lines=text.split("\n")
let list=[]
let temp={}

for(let line of lines){

line=line.trim()

if(line.startsWith("#EXTINF")){

let name=line.split(",").pop()

let logo=line.match(/tvg-logo="(.+?)"/)
let group=line.match(/group-title="(.+?)"/)

temp.name=name
temp.logo=logo?logo[1]:""
temp.group=group?group[1]:"Other"

}

else if(line && !line.startsWith("#")){

temp.url=line
list.push({...temp})
temp={}

}

}

return list

}

async function loadM3U(){

let file=document.getElementById("fileInput").files[0]
let url=document.getElementById("urlInput").value

if(file){

let reader=new FileReader()

reader.onload=e=>{
channels=parseM3U(e.target.result)
render()
}

reader.readAsText(file)

}

else if(url){

let res=await fetch(url)
let txt=await res.text()

channels=parseM3U(txt)

render()

}

else{

alert("ادخل ملف او رابط")

}

}

function render(){

let table=document.getElementById("channels")

table.innerHTML=""

channels.forEach((c,i)=>{

let row=document.createElement("tr")

row.innerHTML=`

<td>${i+1}</td>

<td>${c.logo?`<img src="${c.logo}" class="logo">`:""}</td>

<td>${c.name}</td>

<td>${c.group}</td>

<td class="ping">-</td>

<td class="status">⏳</td>

<td><button onclick="play('${c.url}')">▶</button></td>

<td><button onclick="copy('${c.url}')">📋</button></td>

`

table.appendChild(row)

})

document.getElementById("total").innerText=channels.length

}

async function ping(url){

let start=performance.now()

try{

await fetch(url,{method:"HEAD"})

return Math.round(performance.now()-start)

}

catch{

return null

}

}

async function check(url){

try{

let controller=new AbortController()

setTimeout(()=>controller.abort(),5000)

let r=await fetch(url,{method:"HEAD",signal:controller.signal})

return r.ok

}

catch{

return false

}

}

async function scanChannels(){

let rows=document.querySelectorAll("#channels tr")

let working=0
let dead=0

for(let i=0;i<channels.length;i++){

let ok=await check(channels[i].url)
let pingTime=await ping(channels[i].url)

rows[i].querySelector(".ping").innerText=pingTime?pingTime+"ms":"-"

let statusCell=rows[i].querySelector(".status")

if(ok){

statusCell.innerHTML="✅"
statusCell.className="status-ok"

channels[i].status=true
working++

}

else{

statusCell.innerHTML="❌"
statusCell.className="status-dead"

channels[i].status=false
dead++

}

document.getElementById("progress").value=(i/channels.length)*100

}

document.getElementById("working").innerText=working
document.getElementById("dead").innerText=dead

}

function play(url){

let video=document.getElementById("player")

video.style.display="block"

if(Hls.isSupported()){

let hls=new Hls()

hls.loadSource(url)

hls.attachMedia(video)

}

else{

video.src=url

}

video.play()

}

function copy(url){

navigator.clipboard.writeText(url)

alert("تم النسخ")

}

function searchChannel(){

let q=document.getElementById("search").value.toLowerCase()

let rows=document.querySelectorAll("#channels tr")

rows.forEach(r=>{

let name=r.children[2].innerText.toLowerCase()

r.style.display=name.includes(q)?"":"none"

})

}

function filterWorking(){

let rows=document.querySelectorAll("#channels tr")

rows.forEach((r,i)=>{

if(!channels[i].status){

r.style.display="none"

}

})

}

function removeDuplicates(){

let seen=new Set()

channels=channels.filter(c=>{

if(seen.has(c.url)) return false

seen.add(c.url)

return true

})

render()

}

function exportM3U(){

let data="#EXTM3U\n"

channels.filter(c=>c.status).forEach(c=>{

data+=`#EXTINF:-1,${c.name}\n${c.url}\n`

})

let blob=new Blob([data])

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="working_channels.m3u"

a.click()

}

document.body.addEventListener("dragover",e=>{

e.preventDefault()

})

document.body.addEventListener("drop",e=>{

e.preventDefault()

let file=e.dataTransfer.files[0]

let reader=new FileReader()

reader.onload=ev=>{

channels=parseM3U(ev.target.result)

render()

}

reader.readAsText(file)

})

</script>

</body>
</html>
