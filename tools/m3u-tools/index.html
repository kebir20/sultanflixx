<!DOCTYPE html><html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>SULTAN IPTV PRO+</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body { margin: 0; background: #111; color: #fff; font-family: Arial; }
    .header { background: #202020; padding: 15px; text-align: center; font-size: 22px; color: #f0ea2b; }
    .container { display: flex; flex-direction: column; height: calc(100vh - 60px); }
    .player-area { background: #000; padding: 10px; position: relative; }
    video { width: 100%; max-height: 400px; border-radius: 10px; background: #000; }
    .controls-extended { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
    .controls-extended button {
      padding: 10px 14px; border: none; border-radius: 10px; font-size: 18px;
      cursor: pointer; transition: 0.3s; outline: none;
    }
    #logo { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.6); padding: 4px 10px; border-radius: 8px; font-size: 14px; color: #f0ea2b; }
    .layout { display: flex; flex: 1; overflow: hidden; }
    .sidebar { width: 450px; background: #181818; display: flex; flex-direction: row-reverse; overflow: hidden; }
    .categories-list, .channel-list {
      padding: 10px; overflow-y: auto; height: 100%;
    }
    .categories-list { width: 140px; background: #1f1f1f; }
    .channel-list { flex: 1; }
    .category-item, .channel-item {
      background: #2a2a2a; color: #fff; padding: 10px; margin-bottom: 6px; border-radius: 8px;
      text-align: center; cursor: pointer; font-size: 15px;
    }
    .category-item:focus, .channel-item:focus {
      background: #007bff; transform: scale(1.05); box-shadow: 0 0 10px #007bff;
    }
    #channelCount { text-align: center; color: #ccc; margin: 5px 0; font-size: 14px; }
    .btn-blue { background: #007bff; color: #fff; }
    .btn-gray { background: #666; color: #fff; }
    .btn-green { background: #28a745; color: #fff; }
    .btn-gold { background: gold; color: #000; }
    .btn-purple { background: purple; color: #fff; }
    .btn-darkblue { background: #0056b3; color: #fff; }
    .btn-lightblue { background: #33c4ff; color: #000; }
    .btn-orange { background: orange; color: #000; }
  </style>
</head>
<body>
  <div class="header">SULTAN IPTV PRO+</div>
  <div class="container">
    <div class="player-area">
      <div id="logo">SULTAN IPTV</div>
      <video id="videoPlayer" controls autoplay playsinline></video>
      <div class="controls-extended">
        <button id="playPauseBtn" class="btn-blue">⏯</button>
        <button id="muteBtn" class="btn-gray">🔊</button>
        <button id="fullscreenBtn" class="btn-green">⛶</button>
        <button id="favBtn" class="btn-gold">⭐</button>
        <button id="favFilterBtn" class="btn-orange">⭐ المفضلة (<span id="favCount">0</span>)</button>
        <button id="prevBtn" class="btn-darkblue">⏮</button>
        <button id="nextBtn" class="btn-lightblue">⏭</button>
        <button id="randomBtn" class="btn-purple">🔀</button>
      </div>
    </div>
    <div class="layout">
      <div class="sidebar">
        <div class="categories-list" id="categoriesList"></div>
        <div class="channel-list">
          <div id="channelCount">عدد القنوات: 0</div>
          <div id="channelList"></div>
        </div>
      </div>
    </div>
  </div>  <script>
    const video = document.getElementById('videoPlayer');
    const categoriesList = document.getElementById('categoriesList');
    const channelList = document.getElementById('channelList');
    const channelCount = document.getElementById('channelCount');
    const logo = document.getElementById('logo');
    const favCount = document.getElementById('favCount');
    const servers = {
  "Global": [
    { name:"World Channels", url:"https://iptv-org.github.io/iptv/index.m3u" },
    { name:"Arabic", url:"https://iptv-org.github.io/iptv/languages/ara.m3u" },
    { name:"English", url:"https://iptv-org.github.io/iptv/languages/eng.m3u" },
    { name:"Sports", url:"https://iptv-org.github.io/iptv/categories/sports.m3u" },
    { name:"Movies", url:"https://iptv-org.github.io/iptv/categories/movies.m3u" },
    { name:"News", url:"https://iptv-org.github.io/iptv/categories/news.m3u" }
  ]
    };

    let channels = [], grouped = {}, currentGroup = "الكل", showOnlyFav = false;
    let favChannels = new Set();
    let lastPlayed = localStorage.getItem("lastChannel") || null;

    function saveFavorites() {
      localStorage.setItem("favChannels", JSON.stringify([...favChannels]));
    }
    function loadFavorites() {
      const saved = localStorage.getItem("favChannels");
      if (saved) favChannels = new Set(JSON.parse(saved));
    }
    function updateFavCount() {
      favCount.textContent = favChannels.size;
      saveFavorites();
    }
    function renderCategories() {
      categoriesList.innerHTML = '';
      const all = ["الكل", ...Object.keys(grouped)];
      all.forEach(group => {
        const div = document.createElement('div');
        div.className = 'category-item';
        div.tabIndex = 0;
        div.textContent = group;
        div.onclick = () => {
          currentGroup = group;
          renderChannels();
        };
        categoriesList.appendChild(div);
      });
    }
    function renderChannels() {
      channelList.innerHTML = '';
      const list = currentGroup === "الكل" ? channels : grouped[currentGroup] || [];
      const filtered = showOnlyFav ? list.filter(ch => favChannels.has(ch.name)) : list;
      channelCount.textContent = `عدد القنوات: ${filtered.length}`;
      filtered.forEach((ch, i) => {
        const div = document.createElement('div');
        div.className = 'channel-item';
        div.tabIndex = 0;
        div.textContent = ch.name;
        div.onclick = () => playChannel(ch, div);
        channelList.appendChild(div);
        if (lastPlayed === ch.name) div.classList.add('active');
      });
    }
    function playChannel(ch, el) {
      document.querySelectorAll('.channel-item').forEach(d => d.classList.remove('active'));
      if (el) el.classList.add('active');
      video.src = ch.url;
      video.play();
      logo.textContent = `تشاهد الآن: ${ch.name}`;
      lastPlayed = ch.name;
      localStorage.setItem("lastChannel", ch.name);
    }
    async function loadServer(url) {
      channels = []; grouped = {};
      const res = await fetch(url); const text = await res.text();
      const lines = text.split('\n');
      for (let i = 0; i < lines.length; i++) {
        if (lines[i].startsWith('#EXTINF')) {
          const name = lines[i].split(',')[1]?.trim() || 'قناة';
          const groupRaw = lines[i].match(/group-title="(.*?)"/)?.[1] || 'غير مصنف';
          const groups = groupRaw.split(';');
          const link = lines[i + 1]?.trim();
          if (link?.startsWith('http')) {
            const ch = { name, url: link, group };
            channels.push(ch);
            groups.forEach(group => {
           const g = group.trim();

           if (!grouped[g]) grouped[g] = [];

           grouped[g].push(ch);

});
          }
        }
      }
      renderCategories();
      renderChannels();
    }
    function getCurrentIndex() {
      return channels.findIndex(ch => ch.name === lastPlayed);
    }
    document.getElementById('playPauseBtn').onclick = () => video.paused ? video.play() : video.pause();
    document.getElementById('muteBtn').onclick = () => video.muted = !video.muted;
    document.getElementById('fullscreenBtn').onclick = () => video.requestFullscreen && video.requestFullscreen();
    document.getElementById('favBtn').onclick = () => {
      const active = document.querySelector('.channel-item.active');
      if (active) {
        const name = active.textContent;
        favChannels.has(name) ? favChannels.delete(name) : favChannels.add(name);
        updateFavCount();
      }
    };
    document.getElementById('favFilterBtn').onclick = () => {
      showOnlyFav = !showOnlyFav;
      renderChannels();
    };
    document.getElementById('prevBtn').onclick = () => {
      let i = getCurrentIndex();
      if (i > 0) playChannel(channels[i - 1]);
    };
    document.getElementById('nextBtn').onclick = () => {
      let i = getCurrentIndex();
      if (i < channels.length - 1) playChannel(channels[i + 1]);
    };
    document.getElementById('randomBtn').onclick = () => {
      const ch = channels[Math.floor(Math.random() * channels.length)];
      playChannel(ch);
    };
    document.addEventListener('keydown', e => {
      const el = document.activeElement;
      if (e.key === 'Enter' && el.classList.contains('channel-item')) el.click();
    });
    loadFavorites();
    updateFavCount();
    loadServer(servers.Global[0].url);
  </script></body>
</html>
