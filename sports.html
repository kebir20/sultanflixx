<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SULTAN SPORTS+ V2 PRO</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: #fff;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        .header {
            background: #202020;
            padding: 15px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            color: #f0ea2b;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.4);
        }

        .container {
            display: flex;
            height: calc(100vh - 60px);
        }

        .sidebar {
            width: 300px;
            background: #181818;
            overflow-y: auto;
            padding: 10px;
        }

        .channel-item {
            padding: 12px;
            margin-bottom: 5px;
            border-radius: 5px;
            background: #2a2a2a;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
        }

        .channel-item:hover,
        .channel-item.active {
            background: #007bff;
            color: #fff;
            transform: translateX(-5px);
        }

        .player-area {
            flex: 1;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            flex-direction: column;
            padding: 10px;
        }

        video {
            width: 100%;
            max-height: 80%;
            border-radius: 10px;
            background: #000;
        }

        .controls {
            margin-top: 10px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .controls button {
            padding: 8px 12px;
            border: none;
            background: #007bff;
            border-radius: 5px;
            color: #fff;
            cursor: pointer;
            transition: 0.2s;
        }

        .controls button:hover {
            opacity: 0.8;
        }

        #logo {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.5);
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 16px;
            color: #f0ea2b;
        }

        #searchInput {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 5px;
            border: none;
            background: #333;
            color: #fff;
        }
    </style>
</head>

<body>
    <div class="header">SULTAN SPORTS+ V2 PRO</div>

    <div class="container">
        <div class="sidebar">
            <input type="text" id="searchInput" placeholder="🔍 ابحث عن قناة">
            <button id="favFilterBtn">⭐ عرض المفضلة فقط</button>
            <hr>
            <div id="channelList"></div>
        </div>

        <div class="player-area">
            <div id="logo">SULTAN SPORTS+</div>
            <video id="videoPlayer" controls autoplay playsinline></video>
            <div class="controls">
                <button id="playPauseBtn">⏯</button>
                <button id="muteBtn">🔊</button>
                <button id="fullscreenBtn">⛶</button>
                <button id="favBtn">⭐</button>
                <button id="themeBtn">🌙</button>
            </div>
        </div>
    </div>

    <script>
        const BASE_URL = "http://f335f3de.ottclub.xyz:80/iptv/QPRSSCLKLK6HZ2/";
        const video = document.getElementById('videoPlayer');
        const channelList = document.getElementById('channelList');
        const searchInput = document.getElementById('searchInput');
        const favFilterBtn = document.getElementById('favFilterBtn');

        const channels = [
            { id: "2499", name: "Bein Sports 1 HD FR" },
            { id: "6123", name: "beIN Sports 1 HD QA" },
            { id: "6131", name: "beIN Sports 1 Premium HD QA" },
            { id: "6133", name: "beIN Sports 2 HD EN" },
            { id: "2500", name: "Bein Sports 2 HD FR" },
            { id: "2501", name: "Bein Sports 3 HD FR" },
            { id: "6124", name: "beIN Sports 3 HD QA" },
            { id: "6125", name: "beIN Sports 4 HD QA" },
            { id: "6126", name: "beIN Sports 5 HD QA" },
            { id: "6127", name: "beIN Sports 6 HD QA" },
            { id: "6128", name: "beIN Sports 7 HD QA" },
            { id: "2543", name: "BEIN SPORTS HD ES" }
        ];

        let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
        let favOnly = false;

        favFilterBtn.onclick = () => {
            favOnly = !favOnly;
            favFilterBtn.innerText = favOnly ? '🔙 عرض الكل' : '⭐ عرض المفضلة فقط';
            renderChannels();
        };

        function renderChannels() {
            channelList.innerHTML = "";
            const search = searchInput.value.toLowerCase();
            channels.forEach(ch => {
                if ((!favOnly || favorites.includes(ch.id)) && ch.name.toLowerCase().includes(search)) {
                    const div = document.createElement('div');
                    div.className = 'channel-item';
                    div.textContent = ch.name + (favorites.includes(ch.id) ? ' ★' : '');
                    div.dataset.id = ch.id;
                    div.onclick = () => selectChannel(ch.id, div);
                    channelList.appendChild(div);
                }
            });
        }

        function selectChannel(id, el) {
            document.querySelectorAll('.channel-item').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            video.src = `${BASE_URL}${id}/index.m3u8`;
            video.play();
        }

        document.getElementById('playPauseBtn').onclick = () => video.paused ? video.play() : video.pause();
        document.getElementById('muteBtn').onclick = () => video.muted = !video.muted;
        document.getElementById('fullscreenBtn').onclick = () => video.requestFullscreen();
        document.getElementById('themeBtn').onclick = () => document.body.classList.toggle('dark-mode');
        document.getElementById('favBtn').onclick = () => {
            const active = document.querySelector('.channel-item.active');
            if (!active) return;
            const id = active.dataset.id;
            if (favorites.includes(id)) favorites = favorites.filter(f => f !== id);
            else favorites.push(id);
            localStorage.setItem('favorites', JSON.stringify(favorites));
            renderChannels();
        };

        searchInput.oninput = renderChannels;

        renderChannels();
    </script>
</body>

</html>
