<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>القرآن الكريم | تلاوة وقراءة - جزء عمّ (روابط صوتية ثابتة)</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; background: linear-gradient(145deg, #f8f5ec 0%, #efe6d7 100%); min-height: 100vh; }
        .quran-text { font-family: 'Amiri', 'Uthmanic Script', serif; font-size: 1.6rem; line-height: 2.1rem; font-weight: 500; }
        @media (max-width: 640px) { .quran-text { font-size: 1.3rem; line-height: 1.8rem; } }
        .ayah-card { transition: all 0.2s ease; }
        .ayah-card:hover { transform: translateY(-3px); box-shadow: 0 15px 25px -12px rgba(0,0,0,0.15); }
        .btn-audio { transition: 0.2s; }
        .btn-audio:active { transform: scale(0.95); }
        .loading-spinner { border: 3px solid #e9e0d0; border-top: 3px solid #b87333; border-radius: 50%; width: 36px; height: 36px; animation: spin 0.7s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .active-audio { background-color: #2c7a4d !important; color: white !important; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div class="max-w-5xl mx-auto px-4 py-6 md:py-8">
    <div class="text-center mb-8">
        <h1 class="text-4xl md:text-5xl font-bold text-amber-900 inline-flex items-center gap-3">
            <i class="fas fa-quran text-amber-700"></i> القرآن الكريم
        </h1>
        <p class="text-amber-800/70 text-lg mt-2">استماع وقراءة - جزء عمّ (النبأ إلى الناس) | بصوت مشاري العفاسي</p>
        <div class="w-24 h-1 bg-amber-600/40 mx-auto mt-3 rounded-full"></div>
    </div>

    <div class="bg-white/80 backdrop-blur-sm rounded-2xl shadow-lg p-4 md:p-5 mb-8 border border-amber-200/60">
        <div class="flex flex-col md:flex-row gap-5 items-center justify-between">
            <div class="w-full md:w-auto flex-1">
                <label class="block text-amber-800 font-semibold mb-1 text-sm"><i class="fas fa-book-open ml-1"></i> اختر السورة</label>
                <select id="surahSelect" class="w-full md:w-80 bg-amber-50 border border-amber-300 rounded-xl px-4 py-2.5 text-gray-800 font-medium focus:ring-2 focus:ring-amber-500"></select>
            </div>
            <div id="surahInfo" class="text-center md:text-right bg-amber-100/50 px-4 py-2 rounded-xl flex-1 text-amber-800 text-sm">
                <i class="fas fa-info-circle ml-1"></i> اختر سورة لعرض الآيات والاستماع
            </div>
            <button id="stopAllAudio" class="bg-amber-600 hover:bg-amber-700 text-white px-5 py-2 rounded-xl transition flex items-center gap-2 shadow-md">
                <i class="fas fa-stop-circle"></i> إيقاف التلاوة
            </button>
        </div>
    </div>

    <div id="loadingIndicator" class="hidden flex justify-center items-center py-16">
        <div class="loading-spinner"></div>
        <span class="mr-3 text-amber-800 font-medium">جاري تحميل السورة...</span>
    </div>

    <div id="versesContainer" class="space-y-4">
        <div class="text-center py-12 bg-white/40 rounded-2xl border border-dashed border-amber-300">
            <i class="fas fa-hand-peace text-5xl text-amber-400 mb-3"></i>
            <p class="text-amber-700">اختر سورة لتظهر آياتها الكريمة مع التلاوة والترجمة</p>
        </div>
    </div>

    <div class="mt-10 text-center text-amber-700/70 text-sm border-t border-amber-200/50 pt-5">
        <p><i class="fas fa-headphones ml-1"></i> تلاوة القارئ <span class="font-semibold text-amber-800">مشاري راشد العفاسي</span> | رواية حفص عن عاصم</p>
        <p class="text-xs mt-1">ترجمة معاني الآيات باللغة الإنجليزية (صحيح الدولية)</p>
    </div>
</div>

<script>
    // قائمة سور جزء عمّ (78 إلى 114)
    const JUZZ_AMMA = [
        { id: 78, nameAr: "النبأ", nameEn: "An-Naba'", verses: 40 },
        { id: 79, nameAr: "النازعات", nameEn: "An-Nazi'at", verses: 46 },
        { id: 80, nameAr: "عبس", nameEn: "'Abasa", verses: 42 },
        { id: 81, nameAr: "التكوير", nameEn: "At-Takwir", verses: 29 },
        { id: 82, nameAr: "الانفطار", nameEn: "Al-Infitar", verses: 19 },
        { id: 83, nameAr: "المطففين", nameEn: "Al-Mutaffifin", verses: 36 },
        { id: 84, nameAr: "الانشقاق", nameEn: "Al-Inshiqaq", verses: 25 },
        { id: 85, nameAr: "البروج", nameEn: "Al-Buruj", verses: 22 },
        { id: 86, nameAr: "الطارق", nameEn: "At-Tariq", verses: 17 },
        { id: 87, nameAr: "الأعلى", nameEn: "Al-A'la", verses: 19 },
        { id: 88, nameAr: "الغاشية", nameEn: "Al-Ghashiyah", verses: 26 },
        { id: 89, nameAr: "الفجر", nameEn: "Al-Fajr", verses: 30 },
        { id: 90, nameAr: "البلد", nameEn: "Al-Balad", verses: 20 },
        { id: 91, nameAr: "الشمس", nameEn: "Ash-Shams", verses: 15 },
        { id: 92, nameAr: "الليل", nameEn: "Al-Layl", verses: 21 },
        { id: 93, nameAr: "الضحى", nameEn: "Ad-Duhaa", verses: 11 },
        { id: 94, nameAr: "الشرح", nameEn: "Ash-Sharh", verses: 8 },
        { id: 95, nameAr: "التين", nameEn: "At-Tin", verses: 8 },
        { id: 96, nameAr: "العلق", nameEn: "Al-'Alaq", verses: 19 },
        { id: 97, nameAr: "القدر", nameEn: "Al-Qadr", verses: 5 },
        { id: 98, nameAr: "البينة", nameEn: "Al-Bayyinah", verses: 8 },
        { id: 99, nameAr: "الزلزلة", nameEn: "Az-Zalzalah", verses: 8 },
        { id: 100, nameAr: "العاديات", nameEn: "Al-'Adiyat", verses: 11 },
        { id: 101, nameAr: "القارعة", nameEn: "Al-Qari'ah", verses: 11 },
        { id: 102, nameAr: "التكاثر", nameEn: "At-Takathur", verses: 8 },
        { id: 103, nameAr: "العصر", nameEn: "Al-'Asr", verses: 3 },
        { id: 104, nameAr: "الهمزة", nameEn: "Al-Humazah", verses: 9 },
        { id: 105, nameAr: "الفيل", nameEn: "Al-Fil", verses: 5 },
        { id: 106, nameAr: "قريش", nameEn: "Quraysh", verses: 4 },
        { id: 107, nameAr: "الماعون", nameEn: "Al-Ma'un", verses: 7 },
        { id: 108, nameAr: "الكوثر", nameEn: "Al-Kawthar", verses: 3 },
        { id: 109, nameAr: "الكافرون", nameEn: "Al-Kafirun", verses: 6 },
        { id: 110, nameAr: "النصر", nameEn: "An-Nasr", verses: 3 },
        { id: 111, nameAr: "المسد", nameEn: "Al-Masad", verses: 5 },
        { id: 112, nameAr: "الإخلاص", nameEn: "Al-Ikhlas", verses: 4 },
        { id: 113, nameAr: "الفلق", nameEn: "Al-Falaq", verses: 5 },
        { id: 114, nameAr: "الناس", nameEn: "An-Nas", verses: 5 }
    ];

    let currentAudio = null;
    let currentButton = null;
    let activeCard = null;

    const surahSelect = document.getElementById('surahSelect');
    const versesContainer = document.getElementById('versesContainer');
    const loadingIndicator = document.getElementById('loadingIndicator');
    const surahInfoDiv = document.getElementById('surahInfo');
    const stopAllBtn = document.getElementById('stopAllAudio');

    function populateSurahList() {
        surahSelect.innerHTML = '<option value="" disabled>-- اختر السورة --</option>';
        JUZZ_AMMA.forEach(s => {
            const option = document.createElement('option');
            option.value = s.id;
            option.textContent = `${s.id}. ${s.nameAr} (${s.nameEn}) - ${s.verses} آية`;
            surahSelect.appendChild(option);
        });
        surahSelect.value = "78"; // السورة الافتراضية
        loadSurah(78);
    }

    // دالة لبناء رابط الصوت الثابت من خادم mp3quran.net (الأكثر استقراراً)
    function getAudioUrl(surahId, ayahNumber) {
        // الرابط الأساسي بصيغة: /afs/xxx/xxx.mp3  (ثلاثة أرقام للسورة وثلاثة للآية)
        const surahPad = String(surahId).padStart(3, '0');
        const ayahPad = String(ayahNumber).padStart(3, '0');
        // الخادم الأول: server8.mp3quran.net/afs
        return `https://server8.mp3quran.net/afs/${surahPad}${ayahPad}.mp3`;
    }

    // إيقاف الصوت الحالي
    function stopCurrentAudio() {
        if (currentAudio) {
            currentAudio.pause();
            currentAudio.currentTime = 0;
            currentAudio = null;
        }
        if (currentButton) {
            currentButton.innerHTML = '<i class="fas fa-play"></i>';
            currentButton.classList.remove('active-audio', 'bg-emerald-700');
            currentButton.classList.add('bg-amber-600', 'hover:bg-amber-700');
            currentButton = null;
        }
        if (activeCard) {
            activeCard.classList.remove('bg-amber-100/70', 'border-amber-400');
            activeCard = null;
        }
    }

    // تشغيل آية مع محاولة إعادة المحاولة إذا فشل الرابط
    function playAyah(surahId, ayahNumber, buttonElement, cardElement) {
        if (currentAudio && currentButton === buttonElement) {
            stopCurrentAudio();
            return;
        }
        stopCurrentAudio();

        const audioUrl = getAudioUrl(surahId, ayahNumber);
        const audio = new Audio(audioUrl);
        
        // إظهار مؤقت loading على الزر
        const originalIcon = buttonElement.innerHTML;
        buttonElement.innerHTML = '<i class="fas fa-spinner fa-pulse"></i>';
        buttonElement.disabled = true;

        audio.addEventListener('canplaythrough', () => {
            buttonElement.innerHTML = '<i class="fas fa-pause"></i>';
            buttonElement.disabled = false;
        });

        audio.addEventListener('error', (e) => {
            console.warn("فشل الرابط الأساسي، محاولة رابط بديل...");
            // رابط بديل من everyayah.com كنسخة احتياطية
            const fallbackUrl = `https://www.everyayah.com/data/Alafasy_64kbps/${surahId}_${ayahNumber}.mp3`;
            const fallbackAudio = new Audio(fallbackUrl);
            fallbackAudio.addEventListener('canplaythrough', () => {
                buttonElement.innerHTML = '<i class="fas fa-pause"></i>';
                buttonElement.disabled = false;
            });
            fallbackAudio.addEventListener('error', () => {
                buttonElement.innerHTML = originalIcon;
                buttonElement.disabled = false;
                alert(`⚠️ تعذر تحميل تلاوة الآية ${ayahNumber}. يرجى التحقق من اتصال الإنترنت.`);
                stopCurrentAudio();
            });
            fallbackAudio.play().catch(err => {
                buttonElement.innerHTML = originalIcon;
                buttonElement.disabled = false;
                alert(`فشل تشغيل الآية ${ayahNumber}: قد يكون المتصفح منع التشغيل التلقائي.`);
            });
            currentAudio = fallbackAudio;
            currentButton = buttonElement;
            activeCard = cardElement;
            buttonElement.classList.remove('bg-amber-600', 'hover:bg-amber-700');
            buttonElement.classList.add('active-audio', 'bg-emerald-700');
            cardElement.classList.add('bg-amber-100/70', 'border-amber-400');
            
            fallbackAudio.addEventListener('ended', () => stopCurrentAudio());
        });

        audio.addEventListener('canplaythrough', () => { buttonElement.innerHTML = '<i class="fas fa-pause"></i>'; buttonElement.disabled = false; });
        audio.play().catch(err => {
            console.error("التشغيل الأساسي فشل:", err);
            buttonElement.innerHTML = originalIcon;
            buttonElement.disabled = false;
            alert("للتشغيل، يرجى النقر على الزر بعد تحميل الصفحة (سياسة المتصفحات). حاول مرة أخرى.");
            stopCurrentAudio();
        });

        currentAudio = audio;
        currentButton = buttonElement;
        activeCard = cardElement;
        buttonElement.classList.remove('bg-amber-600', 'hover:bg-amber-700');
        buttonElement.classList.add('active-audio', 'bg-emerald-700');
        cardElement.classList.add('bg-amber-100/70', 'border-amber-400');

        audio.addEventListener('ended', () => stopCurrentAudio());
    }

    // جلب بيانات الآيات (عربي + ترجمة) من API قرآن
    async function fetchSurahData(surahId) {
        const arabicUrl = `https://api.alquran.cloud/v1/surah/${surahId}/quran-uthmani`;
        const englishUrl = `https://api.alquran.cloud/v1/surah/${surahId}/en.sahih`;
        const res = await Promise.all([fetch(arabicUrl), fetch(englishUrl)]);
        if (!res[0].ok || !res[1].ok) throw new Error("فشل تحميل النص القرآني");
        const arabicData = await res[0].json();
        const englishData = await res[1].json();
        if (arabicData.code !== 200 || englishData.code !== 200) throw new Error("API error");
        const arabicVerses = arabicData.data.ayahs;
        const englishVerses = englishData.data.ayahs;
        return arabicVerses.map((ayah, idx) => ({
            numberInSurah: ayah.numberInSurah,
            arabicText: ayah.text,
            translation: englishVerses[idx] ? englishVerses[idx].text : "الترجمة غير متوفرة"
        }));
    }

    // عرض الآيات في الصفحة
    async function loadSurah(surahId) {
        const surahMeta = JUZZ_AMMA.find(s => s.id == surahId);
        if (!surahMeta) return;
        
        loadingIndicator.classList.remove('hidden');
        versesContainer.innerHTML = '';
        surahInfoDiv.innerHTML = `<i class="fas fa-spinner fa-pulse ml-1"></i> جاري تحميل سورة ${surahMeta.nameAr}...`;
        
        try {
            const verses = await fetchSurahData(surahId);
            loadingIndicator.classList.add('hidden');
            surahInfoDiv.innerHTML = `<span class="font-bold">${surahMeta.nameAr} (${surahMeta.nameEn})</span> - ${verses.length} آية | ترجمة صحيح الدولية`;
            
            versesContainer.innerHTML = '';
            for (const ayah of verses) {
                const card = document.createElement('div');
                card.className = 'ayah-card bg-white rounded-2xl shadow-md border border-amber-100 p-4 md:p-5 transition-all';
                card.setAttribute('data-ayah', ayah.numberInSurah);
                
                const top = document.createElement('div');
                top.className = 'flex justify-between items-center mb-3';
                const left = document.createElement('div');
                left.className = 'flex items-center gap-3';
                const btn = document.createElement('button');
                btn.className = 'btn-audio bg-amber-600 hover:bg-amber-700 text-white w-10 h-10 rounded-full flex items-center justify-center shadow-md';
                btn.innerHTML = '<i class="fas fa-play"></i>';
                const numSpan = document.createElement('span');
                numSpan.className = 'bg-amber-100 text-amber-800 font-bold rounded-full px-3 py-1 text-sm';
                numSpan.innerHTML = `<i class="fas fa-hashtag text-xs"></i> ${ayah.numberInSurah}`;
                left.appendChild(btn); left.appendChild(numSpan);
                const iconDiv = document.createElement('div');
                iconDiv.innerHTML = '<i class="fas fa-ear-listen text-amber-500"></i>';
                top.appendChild(left); top.appendChild(iconDiv);
                
                const arabicDiv = document.createElement('div');
                arabicDiv.className = 'quran-text text-right leading-loose text-gray-800 mb-3 bg-amber-50/40 p-3 rounded-xl';
                arabicDiv.innerHTML = ayah.arabicText;
                
                const transDiv = document.createElement('div');
                transDiv.className = 'text-gray-600 text-sm md:text-base border-r-4 border-amber-300 pr-3 mr-1 mt-2';
                transDiv.innerHTML = `<span class="text-amber-600 text-xs font-bold ml-2">📖 الترجمة:</span> ${ayah.translation}`;
                
                card.appendChild(top); card.appendChild(arabicDiv); card.appendChild(transDiv);
                versesContainer.appendChild(card);
                
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    playAyah(surahId, ayah.numberInSurah, btn, card);
                });
            }
        } catch (err) {
            loadingIndicator.classList.add('hidden');
            versesContainer.innerHTML = `<div class="text-center py-12 bg-red-50 rounded-2xl"><i class="fas fa-exclamation-triangle text-4xl text-red-500"></i><p class="mt-3 text-red-700">فشل تحميل السورة: ${err.message}</p><button onclick="location.reload()" class="mt-4 bg-amber-600 text-white px-5 py-2 rounded-full">إعادة المحاولة</button></div>`;
            surahInfoDiv.innerHTML = "خطأ في التحميل، حاول اختيار سورة أخرى";
        }
    }

    surahSelect.addEventListener('change', (e) => {
        const id = parseInt(e.target.value);
        if (id && JUZZ_AMMA.some(s => s.id === id)) {
            stopCurrentAudio();
            loadSurah(id);
        }
    });

    stopAllBtn.addEventListener('click', () => {
        stopCurrentAudio();
        const toast = document.createElement('div');
        toast.className = 'fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-amber-800 text-white px-5 py-2 rounded-full shadow-lg z-50 text-sm';
        toast.innerText = '⏹️ تم إيقاف التلاوة';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 1500);
    });

    populateSurahList();
</script>
</body>
</html>
