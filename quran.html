<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>القرآن الكريم - SultanFlix</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
margin:0;
text-align:center;
transition:0.4s;
}

body.light{
background:#f4f4f4;
color:#111;
}

header{
background:#202020;
padding:15px;
font-size:22px;
color:gold;
}

.controls{
padding:15px;
}

select,input{
padding:10px;
font-size:16px;
border-radius:8px;
margin:5px;
}

audio{
width:95%;
margin-top:15px;
}

button{
padding:10px 18px;
border:none;
border-radius:10px;
background:#007bff;
color:white;
font-size:16px;
cursor:pointer;
margin:5px;
}

#quranText{
margin-top:20px;
padding:15px;
line-height:2;
font-size:20px;
max-width:900px;
margin:auto;
}

</style>

</head>

<body>

<header>📖 القرآن الكريم</header>

<div class="controls">

<input id="search" placeholder="🔍 ابحث عن السورة">

<br>

<select id="reciter">

<option value="https://server8.mp3quran.net/afs/">عبدالرحمن السديس</option>
<option value="https://server7.mp3quran.net/s_gmd/">سعد الغامدي</option>
<option value="https://server8.mp3quran.net/ajm/">أحمد العجمي</option>
<option value="https://server6.mp3quran.net/shur/">سعود الشريم</option>
<option value="https://server10.mp3quran.net/minsh/">المنشاوي</option>
<option value="https://server8.mp3quran.net/maher/">ماهر المعيقلي</option>

</select>

<select id="surah"></select>

<br>

<button onclick="playSurah()">▶ تشغيل</button>

<button onclick="downloadSurah()">🎧 تحميل السورة</button>

<button onclick="toggleMode()">🌙 وضع ليلي</button>

</div>

<audio id="player" controls></audio>

<div id="quranText"></div>

<script>

const surahs=[
"الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس",
"هود","يوسف","الرعد","إبراهيم","الحجر","النحل","الإسراء","الكهف","مريم","طه",
"الأنبياء","الحج","المؤمنون","النور","الفرقان","الشعراء","النمل","القصص","العنكبوت","الروم",
"لقمان","السجدة","الأحزاب","سبأ","فاطر","يس","الصافات","ص","الزمر","غافر",
"فصلت","الشورى","الزخرف","الدخان","الجاثية","الأحقاف","محمد","الفتح","الحجرات","ق",
"الذاريات","الطور","النجم","القمر","الرحمن","الواقعة","الحديد","المجادلة","الحشر","الممتحنة",
"الصف","الجمعة","المنافقون","التغابن","الطلاق","التحريم","الملك","القلم","الحاقة","المعارج",
"نوح","الجن","المزمل","المدثر","القيامة","الإنسان","المرسلات","النبأ","النازعات","عبس",
"التكوير","الانفطار","المطففين","الانشقاق","البروج","الطارق","الأعلى","الغاشية","الفجر","البلد",
"الشمس","الليل","الضحى","الشرح","التين","العلق","القدر","البينة","الزلزلة","العاديات",
"القارعة","التكاثر","العصر","الهمزة","الفيل","قريش","الماعون","الكوثر","الكافرون","النصر",
"المسد","الإخلاص","الفلق","الناس"
];

const surahSelect=document.getElementById("surah");

surahs.forEach((s,i)=>{

let num=(i+1).toString().padStart(3,"0");

let option=document.createElement("option");

option.value=num;

option.textContent=(i+1)+" - "+s;

surahSelect.appendChild(option);

});

function playSurah(){

const reciter=document.getElementById("reciter").value;

const surah=surahSelect.value;

const url=reciter+surah+".mp3";

const player=document.getElementById("player");

player.src=url;

player.play();

loadText(parseInt(surah));

}

function downloadSurah(){

const reciter=document.getElementById("reciter").value;

const surah=surahSelect.value;

const url=reciter+surah+".mp3";

window.open(url);

}

async function loadText(num){

let res=await fetch("https://api.alquran.cloud/v1/surah/"+num);

let data=await res.json();

let html="";

data.data.ayahs.forEach(a=>{

html+=a.text+" ("+a.numberInSurah+") ";

});

document.getElementById("quranText").innerHTML=html;

}

function toggleMode(){

document.body.classList.toggle("light");

}

document.getElementById("search").addEventListener("input",function(){

let v=this.value;

for(let o of surahSelect.options){

o.style.display=o.text.includes(v)? "block":"none";

}

});

</script>

</body>

</html>
