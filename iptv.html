<!DOCTYPE html><html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IPTV Player</title>
  <style>
    body { margin:0; font-family:'Segoe UI',sans-serif; background:#000; color:#fff; overflow:hidden; }
    .player-container { position:relative; width:100%; height:100vh; background:black; }
    video { width:100%; height:100%; object-fit:contain; background:black; border-radius:20px; transition:opacity .28s ease; opacity:1; }
    video.switching { opacity:.15; }

    .now-playing {
      position:absolute; top:14px; left:14px;
      background:rgba(0,0,0,.35);
      backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
      padding:8px 12px; border-radius:10px; z-index:12; font-size:14px;
      max-width:70%; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
      border:1px solid rgba(255,255,255,.12);
    }

    .controls {
      position:fixed; bottom:10px; left:0; right:0; margin:auto;
      display:flex; flex-wrap:wrap; justify-content:center; gap:8px;
      background:rgba(0,0,0,.35);
      backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
      padding:10px; border-radius:16px; z-index:10;
      transition:opacity .3s ease; border:1px solid rgba(255,255,255,.1);
    }
    .controls.hidden { opacity:0; pointer-events:none; }
    .controls button,.controls select{
      background:rgba(34,34,34,.8); color:#fff; border:1px solid rgba(255,255,255,.08);
      padding:10px 12px; border-radius:6px; cursor:pointer; font-size:16px;
    }
    .controls input[type="text"], .controls input[type="file"]{
      padding:6px; border-radius:6px; border:none; background:#111; color:#fff; display:none;
    }

    .channel-list{
      position:absolute; top:0; bottom:0; right:0; width:280px;
      background:rgba(20,20,20,.55);
      backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
      overflow-y:auto; padding:10px; z-index:9;
      transform:translateX(105%); transition:transform .28s ease;
      will-change:transform; border-left:1px solid rgba(255,255,255,.1);
    }
    .channel-list.show{ transform:translateX(0); }

    .channel-item{
      background:rgba(255,255,255,.1); margin-bottom:6px; padding:8px; border-radius:6px;
      cursor:pointer; display:flex; align-items:center; gap:8px; min-height:38px;
      transition:transform .15s ease, background .15s ease, box-shadow .15s ease;
      outline:none;
    }
    .channel-item img{ width:26px; height:26px; object-fit:contain; border-radius:4px; background:#000; flex:0 0 auto; }
    .channel-item.selected{ background:#007bff; }
    .channel-item.focused{
      background:rgba(0,123,255,.35);
      box-shadow:0 0 0 2px rgba(0,123,255,.6);
      transform:translateX(-2px) scale(1.01);
    }

    .hint{
      display:none; position:absolute; bottom:80px; left:12px;
      background:rgba(0,0,0,.55); padding:6px 10px; border-radius:8px;
      font-size:12px; z-index:12; opacity:.8;
    }
  </style>
</head>
<body>
  <div class="player-container">
    <video id="videoPlayer" autoplay muted playsinline></video>
    <div class="now-playing" id="nowPlaying">📺 لا توجد قناة</div>
    <div class="hint">⌨️ Space تشغيل/إيقاف • ← السابق • → التالي • F ملء الشاشة</div>

    <div class="controls" id="controls">
      <button id="fileBtn">📂 ملف M3U</button>
      <input type="file" id="fileInput" accept=".m3u,.m3u8">
      <button id="urlToggleBtn">🌐 رابط M3U</button>
      <input type="text" id="m3uUrlInput" placeholder="أدخل رابط M3U">
      <button id="loadUrlBtn">تحميل الرابط</button>

      <select id="categorySelect"><option value="all">كل التصنيفات</option></select>
      <button id="searchToggle">🔍</button>
      <input type="text" id="searchInput" placeholder="ابحث عن قناة...">

      <select id="qualitySelect" title="جودة البث">
        <option value="-1">Auto Quality</option>
      </select>

      <button id="favToggleBtn">⭐</button>
      <button id="viewFavBtn">⭐ عرض المفضلة</button>
      <button id="randomBtn">🎲</button>
      <button id="nextBtn">⏭</button>
      <button id="prevBtn">⏮</button>
      <button id="muteBtn">🔊</button>
      <button id="playPauseBtn">⏯</button>
      <button id="castBtn">📺 Cast</button>
      <button id="fullscreenBtn">⛶</button>
      <button id="toggleListBtn">📺</button>
    </div>
    <div class="channel-list" id="channelList"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script>
const Storage = (() => ({
  get(key, fallback){ try { return JSON.parse(localStorage.getItem(key)) ?? fallback; } catch { return fallback; } },
  set(key, value){ localStorage.setItem(key, JSON.stringify(value)); }
}))();

const Utils = (() => ({
  debounce(fn, wait=300){ let t; return (...a)=>{ clearTimeout(t); t=setTimeout(()=>fn(...a), wait); }; },
  isValidHttpUrl(url){ try{ const u=new URL(url); return ['http:','https:'].includes(u.protocol);}catch{ return false; } },
  normalize(s){ return (s||'').toString().toLowerCase().trim(); },
  fuzzyMatch(text, query){
    text=Utils.normalize(text); query=Utils.normalize(query);
    if(!query) return true;
    if(text.includes(query)) return true;
    let ti=0;
    for(let qi=0; qi<query.length; qi++){
      const ch=query[qi];
      ti=text.indexOf(ch, ti);
      if(ti===-1) return false;
      ti++;
    }
    return true;
  }
}))();

const IPTVPlayer = (() => {
  const video=document.getElementById('videoPlayer');
  const channelList=document.getElementById('channelList');
  const categorySelect=document.getElementById('categorySelect');
  const favBtn=document.getElementById('favToggleBtn');
  const viewFavBtn=document.getElementById('viewFavBtn');
  const urlToggleBtn=document.getElementById('urlToggleBtn');
  const m3uUrlInput=document.getElementById('m3uUrlInput');
  const fileBtn=document.getElementById('fileBtn');
  const fileInput=document.getElementById('fileInput');
  const searchInput=document.getElementById('searchInput');
  const searchToggle=document.getElementById('searchToggle');
  const qualitySelect=document.getElementById('qualitySelect');
  const nowPlaying=document.getElementById('nowPlaying');
  const controls=document.getElementById('controls');

  let hideTimeout, listHideTimeout;
  ['mousemove','keydown','click','touchstart'].forEach(evt=>document.addEventListener(evt, resetHideControls));
  function resetHideControls(){
    controls.classList.remove('hidden');
    clearTimeout(hideTimeout); clearTimeout(listHideTimeout);
    hideTimeout=setTimeout(()=>{ if(document.fullscreenElement) controls.classList.add('hidden'); }, 5000);
    listHideTimeout=setTimeout(()=>{ if(document.fullscreenElement) channelList.classList.remove('show'); }, 7000);
  }

  let hls=null, currentIndex=0;
  let channels=[], allChannels=[];
  let favorites=Storage.get('favorites', []);
  let showOnlyFav=false, currentCategory='all', searchTerm='';
  let loadedCount=0; const CHUNK=120;
  let lastFilterKey="", cachedFiltered=[];
  let randomHistory=Storage.get('randomHistory', []);
  let focusIndex=-1;
  const playlists=Storage.get('playlists', []);

  function ensureHls(){
    if(hls) return hls;
    if(window.Hls && Hls.isSupported()){
      hls=new Hls();
      hls.on(Hls.Events.ERROR, (e,data)=>{ if(data && data.fatal) playChannel((currentIndex+1)%Math.max(1,channels.length)); });
      hls.on(Hls.Events.MANIFEST_PARSED, ()=>{ video.classList.remove('switching'); video.play().catch(()=>{}); fillQualities(); });
      return hls;
    }
    return null;
  }

  function fillQualities(){
    if(!hls || !hls.levels) return;
    const current=qualitySelect.value;
    qualitySelect.innerHTML='<option value="-1">Auto Quality</option>';
    hls.levels.forEach((lvl,i)=>{
      const opt=document.createElement('option');
      opt.value=i; opt.textContent=(lvl.height?lvl.height+'p':'Level '+i);
      qualitySelect.appendChild(opt);
    });
    if(current) qualitySelect.value=current;
  }
  qualitySelect.onchange=()=>{ if(hls) hls.currentLevel=parseInt(qualitySelect.value,10); };

  urlToggleBtn.onclick=()=>{ m3uUrlInput.style.display = m3uUrlInput.style.display==='inline-block' ? 'none':'inline-block'; };
  searchToggle.onclick=()=>{ searchInput.style.display = searchInput.style.display==='inline-block' ? 'none':'inline-block'; if(searchInput.style.display==='inline-block') searchInput.focus(); };
  fileBtn.onclick=()=>fileInput.click();

  fileInput.addEventListener('change', e=>{
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=()=>parseM3U(reader.result);
    reader.readAsText(file);
  });

  document.getElementById('loadUrlBtn').addEventListener('click', ()=>{
    const url=m3uUrlInput.value.trim();
    if(!Utils.isValidHttpUrl(url)) return alert('رابط غير صالح.');
    loadM3U(url);
  });

  async function loadM3U(url) {
  try {

    // 🔥 تحويل روابط GitHub تلقائيًا
    if (url.includes("github.com")) {
      url = url
        .replace("github.com", "raw.githubusercontent.com")
        .replace("/blob/", "/");
    }

    // محاولة تحميل مباشرة
    let res = await fetch(url);

    // ⚡ fallback proxy (سر مطوري IPTV)
    if (!res.ok) {
      const proxy = "https://corsproxy.io/?";
      res = await fetch(proxy + encodeURIComponent(url));
    }

    const text = await res.text();
    parseM3U(text);

    if (!playlists.includes(url)) {
      playlists.push(url);
      Storage.set("playlists", playlists);
    }

    Storage.set("lastPlaylist", url);

  } catch (err) {
    alert("فشل تحميل الرابط.");
  }
}

  function detectCategory(name, current){
    if(current && current!=='غير مصنف') return current;
    const n=Utils.normalize(name);
    if(/sport|bein|espn|nba|football|soccer|liga|uefa|رياض/.test(n)) return 'رياضة';
    if(/movie|film|cinema|flix|aflam/.test(n)) return 'أفلام';
    if(/news|cnn|bbc|aljazeera|خبر/.test(n)) return 'أخبار';
    if(/kids|cartoon|anime|baby|طفل|كرتون/.test(n)) return 'أطفال';
    if(/music|mtv|song/.test(n)) return 'موسيقى';
    return 'غير مصنف';
  }

  function parseM3U(text){
    const lines=text.split('\n');
    allChannels=[]; let group='';
    for(let i=0;i<lines.length;i++){
      const line=lines[i];
      if(line.startsWith('#EXTINF')){
        const gm=line.match(/group-title="(.*?)"/);
        const lm=line.match(/tvg-logo="(.*?)"/);
        group=gm?gm[1]:'غير مصنف';
        const name=(line.split(',')[1]||'No Name').trim();
        const link=(lines[i+1]||'').trim();
        if(link && link.startsWith('http')){
          allChannels.push({ name, link, group:detectCategory(name,group), logo: lm?lm[1]:'' });
        }
      }
    }

    allChannels.sort((a,b)=> a.group===b.group ? a.name.localeCompare(b.name,'ar') : a.group.localeCompare(b.group,'ar'));

    fillCategories();
    renderChannels(true);

    const smart=Storage.get('smartStart', null);
    if(smart){
      if(typeof smart.volume==='number') video.volume=smart.volume;
      if(typeof smart.muted==='boolean') video.muted=smart.muted;
      if(smart.search){ searchTerm=smart.search; searchInput.value=smart.search; }
      if(smart.category){ currentCategory=smart.category; categorySelect.value=smart.category; }
      renderChannels(true);
    }

    const last=localStorage.getItem('lastPlayed');
    if(last){
      const i2 = (()=>{ channels=filteredChannels(); return channels.findIndex(c=>c.link===last); })();
      if(i2>=0){ currentIndex=i2; playChannel(i2); }
    }
  }

  function fillCategories(){
    const groups=[...new Set(allChannels.map(ch=>ch.group))];
    categorySelect.innerHTML='<option value="all">كل التصنيفات</option>';
    groups.forEach(g=>{ const opt=document.createElement('option'); opt.value=g; opt.textContent=g; categorySelect.appendChild(opt); });
  }

  function filteredChannels(){
    const key=JSON.stringify([showOnlyFav,currentCategory,Utils.normalize(searchTerm),favorites.length,allChannels.length]);
    if(key===lastFilterKey) return cachedFiltered;
    const s=Utils.normalize(searchTerm);
    cachedFiltered=allChannels.filter(ch=>{
      const okFav=!showOnlyFav || favorites.includes(ch.link);
      const okCat=currentCategory==='all' || ch.group===currentCategory;
      const okSearch=!s || Utils.fuzzyMatch(ch.name,s) || Utils.fuzzyMatch(ch.group,s);
      return okFav && okCat && okSearch;
    });
    lastFilterKey=key;
    return cachedFiltered;
  }

  function renderChannels(reset=false){
    if(reset){ channelList.innerHTML=''; loadedCount=0; focusIndex=-1; }
    channels=filteredChannels();
    if(!channels.length){ channelList.innerHTML='<div style="opacity:.7;padding:8px">لا توجد قنوات</div>'; return; }

    const end=Math.min(loadedCount+CHUNK, channels.length);
    const frag=document.createDocumentFragment();
    for(let i=loadedCount;i<end;i++){
      const ch=channels[i];
      const div=document.createElement('div');
      div.className='channel-item';
      div.dataset.index=i; div.dataset.id=ch.link; div.setAttribute('tabindex','0');

      const img=document.createElement('img');
      img.loading='lazy'; img.referrerPolicy='no-referrer'; img.src=ch.logo||''; img.onerror=()=>img.style.display='none';

      const span=document.createElement('span');
      span.textContent=`${favorites.includes(ch.link)?'⭐ ':''}${ch.name}`;

      div.appendChild(img); div.appendChild(span);
      frag.appendChild(div);
    }
    channelList.appendChild(frag);
    loadedCount=end;
  }

  channelList.addEventListener('scroll', ()=>{
    if(channelList.scrollTop + channelList.clientHeight >= channelList.scrollHeight - 120) renderChannels(false);
  });

  channelList.addEventListener('click', e=>{
    const item=e.target.closest('.channel-item'); if(!item) return;
    const idx=parseInt(item.dataset.index,10); if(Number.isNaN(idx)) return;
    currentIndex=idx; playChannel(idx);
  });

  function setFocus(index){
    document.querySelectorAll('.channel-item.focused').forEach(el=>el.classList.remove('focused'));
    const el=channelList.querySelector(`.channel-item[data-index="${index}"]`);
    if(el){ el.classList.add('focused'); el.scrollIntoView({block:'nearest'}); focusIndex=index; }
  }

  function selectItem(index){
    document.querySelectorAll('.channel-item').forEach(e=>e.classList.remove('selected'));
    const el=channelList.querySelector(`.channel-item[data-index="${index}"]`);
    if(el) el.classList.add('selected');
  }

  function playNative(url){
    video.src=url; video.play().catch(()=>{});
    setTimeout(()=>video.classList.remove('switching'), 250);
  }

  function playChannel(index){
    if(!channels.length) return;
    const ch=channels[index]; if(!ch) return;
    video.classList.add('switching');
    selectItem(index); setFocus(index);
    nowPlaying.textContent=`📺 ${ch.name}`;

    if(video.canPlayType('application/vnd.apple.mpegurl')){
      if(hls) hls.detachMedia();
      playNative(ch.link);
    }else{
      const instance=ensureHls();
      if(instance){ instance.loadSource(ch.link); instance.attachMedia(video); }
      else playNative(ch.link);
    }

    localStorage.setItem('lastPlayed', ch.link);
    favBtn.textContent=favorites.includes(ch.link)?'⭐ إزالة':'⭐ إضافة';
  }

  function saveSmartStart(){
    Storage.set('smartStart', {
      volume:video.volume, muted:video.muted,
      category:currentCategory, search:searchTerm, quality:qualitySelect.value
    });
  }
  video.addEventListener('volumechange', Utils.debounce(saveSmartStart, 200));

  favBtn.onclick=()=>{
    if(!channels.length) return;
    const current=channels[currentIndex]; if(!current) return;
    const i=favorites.indexOf(current.link);
    if(i===-1) favorites.push(current.link); else favorites.splice(i,1);
    Storage.set('favorites', favorites);
    renderChannels(true);
  };

  viewFavBtn.onclick=()=>{
    showOnlyFav=!showOnlyFav;
    viewFavBtn.textContent=showOnlyFav?'📺 عرض الكل':'⭐ عرض المفضلة';
    renderChannels(true);
  };

  document.getElementById('toggleListBtn').onclick=()=>channelList.classList.toggle('show');
  document.getElementById('nextBtn').onclick=()=>{ if(channels.length) playChannel((currentIndex+1)%channels.length); };
  document.getElementById('prevBtn').onclick=()=>{ if(channels.length) playChannel((currentIndex-1+channels.length)%channels.length); };

  document.getElementById('randomBtn').onclick=()=>{
    if(!channels.length) return;
    const pool=channels.map((_,i)=>i).filter(i=>!randomHistory.includes(channels[i].link));
    let idx;
    if(pool.length) idx=pool[Math.floor(Math.random()*pool.length)];
    else { randomHistory=[]; idx=Math.floor(Math.random()*channels.length); }
    randomHistory.push(channels[idx].link);
    if(randomHistory.length>100) randomHistory.shift();
    Storage.set('randomHistory', randomHistory);
    playChannel(idx);
  };

  document.getElementById('muteBtn').onclick=()=>{ video.muted=!video.muted; saveSmartStart(); };
  document.getElementById('playPauseBtn').onclick=()=> video.paused ? video.play() : video.pause();
  document.getElementById('fullscreenBtn').onclick=()=> document.fullscreenElement ? document.exitFullscreen() : document.documentElement.requestFullscreen();

  document.getElementById('castBtn').onclick=()=>{
    if('presentation' in navigator) alert('Chromecast يحتاج تكامل Google Cast SDK. هذه نقطة بداية فقط.');
    else alert('المتصفح لا يدعم Cast API مباشرة.');
  };

  categorySelect.onchange=()=>{ currentCategory=categorySelect.value; saveSmartStart(); renderChannels(true); };

  searchInput.addEventListener('input', Utils.debounce(()=>{
    searchTerm=searchInput.value; saveSmartStart(); renderChannels(true);
  }, 250));

  document.addEventListener('keydown', e=>{
    if(e.target && (e.target.tagName==='INPUT' || e.target.tagName==='SELECT')) return;
    if(e.code==='Space'){ e.preventDefault(); video.paused ? video.play() : video.pause(); }
    if(e.code==='ArrowRight'){ if(channels.length) playChannel((currentIndex+1)%channels.length); }
    if(e.code==='ArrowLeft'){ if(channels.length) playChannel((currentIndex-1+channels.length)%channels.length); }

    if(channelList.classList.contains('show')){
      if(e.code==='ArrowDown'){ e.preventDefault(); if(focusIndex<0) setFocus(0); else setFocus(Math.min(channels.length-1, focusIndex+1)); }
      if(e.code==='ArrowUp'){ e.preventDefault(); if(focusIndex<0) setFocus(0); else setFocus(Math.max(0, focusIndex-1)); }
      if(e.code==='Enter' && focusIndex>=0){ e.preventDefault(); currentIndex=focusIndex; playChannel(focusIndex); }
    }

    if(e.key.toLowerCase()==='f'){
      document.fullscreenElement ? document.exitFullscreen() : document.documentElement.requestFullscreen();
    }
  });

  const AUTO_PLAYLIST_URL='';
  if(AUTO_PLAYLIST_URL) loadM3U(AUTO_PLAYLIST_URL);
  else {
    const lastPl=Storage.get('lastPlaylist','');
    if(lastPl) loadM3U(lastPl);
    else if(playlists.length) loadM3U(playlists[playlists.length-1]);
  }

  return { loadM3U, parseM3U };
})();
  </script>
</body>
</html>
