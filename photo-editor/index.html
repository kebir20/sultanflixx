<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>AI WEBSITE BUILDER — ULTRA PRO</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

<h1>🤖 AI WEBSITE BUILDER — ULTRA PRO</h1>

<div class="panel">

<label>💡 فكرة الموقع</label>
<input id="idea" placeholder="مثال: restaurant website">

<div class="row">

<select id="theme">
<option value="auto">Auto Theme</option>
<option value="dark">Dark</option>
<option value="light">Light</option>
<option value="neon">Neon</option>
</select>

<select id="layout">
<option value="auto">AI Layout</option>
<option value="stack">Stack</option>
<option value="split">Split</option>
<option value="cards">Cards</option>
</select>

</div>

<div class="buttons">

<button id="build">🚀 BUILD WEBSITE</button>

<button id="random">🎲 RANDOM IDEA</button>

<button id="mutate">🧬 MUTATE DESIGN</button>

<button id="improve">⚡ IMPROVE</button>

<button id="export">💾 EXPORT WEBSITE</button>

</div>

</div>

<div class="preview">

<iframe id="frame"></iframe>

</div>

</div>

<script src="js/palette-engine.js"></script>
<script src="js/components.js"></script>
<script src="js/ai-engine.js"></script>
<script src="js/drag-builder.js"></script>
<script src="js/export.js"></script>
<script src="js/app.js"></script>

</body>
</html>
