<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Advanced Photo Editor</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h2>🖼️ Advanced Photo Editor</h2>
</header>

<div class="editor">

<!-- Toolbar -->

<div class="toolbar">

<button id="openBtn">Open</button>

<button data-tool="brush">Brush</button>
<button data-tool="eraser">Eraser</button>
<button data-tool="rect">Rectangle</button>
<button data-tool="circle">Circle</button>
<button data-tool="text">Text</button>
<button data-tool="crop">Crop</button>

<button id="undoBtn">Undo</button>
<button id="redoBtn">Redo</button>

<button id="gridBtn">Grid</button>

<button id="downloadBtn">Export</button>

<input type="color" id="colorPicker">

<input type="range" id="brushSize" min="1" max="50" value="5">

</div>

<!-- Workspace -->

<div class="workspace">

<canvas id="canvas"></canvas>

<div class="layers">

<h3>Layers</h3>
<ul id="layerList"></ul>

</div>

</div>

</div>

<input type="file" id="fileInput" hidden>

<script src="script.js"></script>

</body>
</html>
