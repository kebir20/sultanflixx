<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Photo Editor</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>
📱 Mobile Photo Editor
</header>

<div class="workspace">

<canvas id="canvas"></canvas>

</div>

<div class="controls">

<input type="color" id="color" value="#ff0000">

<label>Brush</label>
<input type="range" id="size" min="1" max="50" value="5">

<label>Brightness</label>
<input type="range" id="brightness" min="0" max="200" value="100">

<label>Contrast</label>
<input type="range" id="contrast" min="0" max="200" value="100">

</div>

<div class="toolbar">

<button id="open">📂</button>

<button data-tool="brush">✏️</button>

<button data-tool="eraser">🧽</button>

<button data-tool="rect">⬛</button>

<button data-tool="circle">⚪</button>

<button id="textBtn">T</button>

<button id="undo">↩️</button>

<button id="redo">↪️</button>

<button id="save">💾</button>

</div>

<input type="file" id="fileInput" accept="image/*" hidden>

<script src="script.js"></script>

</body>
</html>
