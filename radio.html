<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌍 Audio Engine UX PRO</title>

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

:root{
  --main:#4f7cff;
  --bg:#f4f6f9;
  --card:rgba(255,255,255,.85);
  --text:#111;
  --muted:#555;
}

body.dark{
  --bg:#0b0f18;
  --card:rgba(20,25,35,.85);
  --text:#fff;
  --muted:#b0b8c5;
}

body{
  margin:0;
  font-family:"Segoe UI",Tahoma;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

/* Dynamic background */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:radial-gradient(circle at top,var(--main),transparent 70%);
  opacity:.25;
  filter:blur(90px);
  z-index:-1;
}

/* ===== STICKY TOP BAR ===== */
.top-bar{
  position:sticky;
  top:0;
  z-index:1000;
  backdrop-filter:blur(18px);
  background:var(--bg);
  padding-bottom:8px;
}

/* HEADER */
header{
  text-align:center;
  padding:14px;
  font-size:26px;
  font-weight:700;
}

/* NAV */
nav{
  display:flex;
  gap:8px;
  overflow-x:auto;
  padding:8px 10px;
}
nav button{
  flex:0 0 auto;
  min-width:90px;
  border:none;
  border-radius:18px;
  background:var(--card);
  color:var(--text);
}
nav button.active{
  background:var(--main);
  color:#fff;
}

/* CONTROLS */
.controls{
  display:grid;
  grid-template-columns:1fr 1fr auto auto auto auto;
  gap:8px;
  padding:0 10px;
}
.controls select,.controls input{
  width:100%;
  min-width:0;
}

input,select{
  border:none;
  border-radius:14px;
  background:var(--card);
  padding:10px;
  color:var(--text);
}

/* CONTAINER */
.container{
  padding:10px;
  padding-bottom:180px;
}

/* RADIO CARD */
.radio-card{
  background:var(--card);
  border-radius:18px;
  padding:12px;
  margin:8px 0;
  display:flex;
  justify-content:space-between;
  align-items:center;
  overflow:hidden;
  box-shadow:0 4px 14px rgba(0,0,0,.12);
}
.radio-card.active{outline:2px solid var(--main);}
.radio-card img{
  width:65px;height:65px;
  object-fit:cover;
  border-radius:12px;
}
.radio-card strong{
  display:block;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  max-width:180px;
}
small{color:var(--muted);}

/* EQUALIZER */
.eq{display:flex;gap:3px;opacity:0;}
body.playing .eq{opacity:1;}
.eq span{
  width:4px;
  background:var(--main);
  animation:eq 1s infinite alternate;
}
.eq span:nth-child(2){animation-delay:.2s}
.eq span:nth-child(3){animation-delay:.4s}
@keyframes eq{from{height:5px;}to{height:22px;}}

/* FLOATING PLAYER */
.floating-player{
  position:fixed;
  left:10px;right:10px;
  bottom:12px;
  background:var(--card);
  backdrop-filter:blur(16px);
  border-radius:20px;
  padding:10px;
  box-shadow:0 8px 25px rgba(0,0,0,.18);
  transform:translateY(120%);
  transition:.35s;
  z-index:900;
}
body.playing .floating-player{transform:translateY(0);}
.floating-player audio{width:100%;}

/* BOTTOM SHEET */
.sheet{
  position:fixed;
  left:0;
  bottom:-100%;
  width:100%;
  height:85%;
  background:var(--card);
  border-radius:25px 25px 0 0;
  transition:.4s;
  z-index:999;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:15px;
  backdrop-filter:blur(20px);
}
.sheet.open{bottom:0;}
.sheet-handle{
  width:50px;height:5px;
  background:#999;border-radius:10px;
  margin-bottom:15px;
}
.sheet-img{
  width:220px;height:220px;
  border-radius:20px;
  object-fit:cover;
}
#sheetPlayer{width:100%;margin-top:auto;}
</style>
</head>

<body>

<div class="top-bar">
<header>🌍 Audio Engine UX PRO</header>

<nav>
<button class="active" onclick="setMode('all',this)">📻 راديو</button>
<button onclick="setMode('news',this)">📰 أخبار</button>
<button onclick="setMode('quran',this)">📖 قرآن</button>
<button onclick="setMode('music',this)">🎵 موسيقى</button>
<button onclick="setMode('religious',this)">🕌 ديني</button>
<button onclick="setMode('fav',this)">⭐ المفضلة</button>
</nav>

<div class="controls">
<select id="country"></select>
<input id="search" placeholder="🔍 بحث">
<button onclick="toggleTheme()">🌙</button>
<button onclick="shuffle()">🔀</button>
<button onclick="prev()">⏮</button>
<button onclick="next()">⏭</button>
</div>
</div>

<div class="container">
<div id="radioList"></div>
</div>

<!-- Floating Player -->
<div class="floating-player" id="floatingPlayer">
  <div class="now" id="nowPlaying">▶️ جاهز</div>
  <div class="eq"><span></span><span></span><span></span></div>
  <audio id="player" controls></audio>
</div>

<!-- Bottom Sheet -->
<div id="sheet" class="sheet">
  <div class="sheet-handle"></div>
  <img id="sheetImg" class="sheet-img">
  <h2 id="sheetTitle">Now Playing</h2>
  <audio id="sheetPlayer" controls></audio>
</div>

<script>
const state={mode:"all",stations:[],filtered:[],currentIndex:-1,renderLimit:30};
let favs=JSON.parse(localStorage.getItem("favs")||"[]");

const rules={
all:/.*/,news:/news|talk|info/,quran:/quran|koran|islam/,
music:/music|pop|rock|jazz|classical/,
religious:/islam|religion|mosque|sermon/,fav:/.*/
};

const player=document.getElementById("player");
const sheet=document.getElementById("sheet");
const sheetImg=document.getElementById("sheetImg");
const sheetTitle=document.getElementById("sheetTitle");
const sheetPlayer=document.getElementById("sheetPlayer");

if(localStorage.getItem("theme")==="true")
document.body.classList.add("dark");

/* Dynamic Color AI */
function applyDynamicColor(img){
 const c=document.createElement("canvas");
 const x=c.getContext("2d");
 c.width=50;c.height=50;
 x.drawImage(img,0,0,50,50);
 const d=x.getImageData(0,0,50,50).data;
 let r=0,g=0,b=0,n=0;
 for(let i=0;i<d.length;i+=4){r+=d[i];g+=d[i+1];b+=d[i+2];n++;}
 document.documentElement.style
 .setProperty("--main",`rgb(${r/n|0},${g/n|0},${b/n|0})`);
}

async function fetchCached(url){
 const c=await caches.open("radio-cache");
 const m=await c.match(url);
 if(m) return m.json();
 const r=await fetch(url); c.put(url,r.clone());
 return r.json();
}

async function loadCountries(){
 const data=await fetchCached("https://de1.api.radio-browser.info/json/countries");
 country.innerHTML="";
 data.forEach(c=>{
  country.innerHTML+=`<option value="${c.iso_3166_1.toLowerCase()}">🌍 ${c.name}</option>`;
 });
}

async function loadRadios(){
 const api=`https://de1.api.radio-browser.info/json/stations/bycountrycodeexact/${country.value}?limit=150&hidebroken=true`;
 state.stations=await fetchCached(api);
 applyFilter();
}

function applyFilter(){
 const q=search.value.toLowerCase();
 state.filtered=state.mode==="fav"
 ? state.stations.filter(s=>favs.includes(s.name))
 : state.stations.filter(s=>{
  const t=(s.name+" "+(s.tags||"")).toLowerCase();
  return rules[state.mode].test(t)&&t.includes(q);
 });
 render();
}

function render(){
 radioList.innerHTML="";
 state.filtered.slice(0,state.renderLimit).forEach((s,i)=>{
  const d=document.createElement("div");
  d.className="radio-card"+(i===state.currentIndex?" active":"");
  d.innerHTML=`
   <div style="display:flex;gap:12px;align-items:center;">
   <img src="${s.favicon||'https://via.placeholder.com/50'}">
   <div><strong>${s.name}</strong><small>${s.bitrate||"?"} kbps</small></div>
   </div>
   <button onclick="event.stopPropagation();toggleFav('${s.name}')">
   ${favs.includes(s.name)?"⭐":"☆"}</button>`;
  d.onclick=()=>play(i);
  radioList.appendChild(d);
 });
}

function toggleFav(n){
 favs=favs.includes(n)?favs.filter(f=>f!==n):[...favs,n];
 localStorage.setItem("favs",JSON.stringify(favs));
 render();
}

function play(i){
 const s=state.filtered[i]; if(!s)return;
 state.currentIndex=i;
 player.src=s.url_resolved||s.url;
 player.play();

 nowPlaying.innerText="🎶 "+s.name;
 sheetTitle.innerText=s.name;
 sheetImg.src=s.favicon||"https://via.placeholder.com/300";
 sheetPlayer.src=player.src;

 const img=new Image();
 img.crossOrigin="anonymous";
 img.src=sheetImg.src;
 img.onload=()=>applyDynamicColor(img);

 render();
}

function next(){if(state.filtered.length)play((state.currentIndex+1)%state.filtered.length);}
function prev(){if(state.currentIndex>0)play(state.currentIndex-1);}
function shuffle(){play(Math.floor(Math.random()*state.filtered.length));}

player.onplay=()=>document.body.classList.add("playing");
player.onpause=()=>document.body.classList.remove("playing");

window.addEventListener("scroll",()=>{
 const bar=document.querySelector(".top-bar");
 bar.style.boxShadow=window.scrollY>10?"0 4px 20px rgba(0,0,0,.15)":"none";
});

function setMode(m,b){
 state.mode=m;
 document.querySelectorAll("nav button").forEach(x=>x.classList.remove("active"));
 b.classList.add("active");
 applyFilter();
}

function toggleTheme(){
 document.body.classList.toggle("dark");
 localStorage.setItem("theme",document.body.classList.contains("dark"));
}

document.getElementById("floatingPlayer").onclick=()=>sheet.classList.add("open");

let startY=0;
sheet.addEventListener("touchstart",e=>startY=e.touches[0].clientY);
sheet.addEventListener("touchmove",e=>{
 if(e.touches[0].clientY-startY>80) sheet.classList.remove("open");
});

search.oninput=applyFilter;
country.onchange=loadRadios;

loadCountries().then(()=>{country.value="us";loadRadios();});
</script>

</body>
</html>
