<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>🌍 Audio Engine UX PRO - النسخة المتكاملة</title>

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

:root{
  --main:#4f7cff;
  --bg:#f4f6f9;
  --card:rgba(255,255,255,.85);
  --text:#111;
  --muted:#555;
}

body.dark{
  --bg:#0b0f18;
  --card:rgba(20,25,35,.85);
  --text:#fff;
  --muted:#b0b8c5;
}

body{
  margin:0;
  font-family:"Segoe UI",Tahoma;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:radial-gradient(circle at top,var(--main),transparent 70%);
  opacity:.25;
  filter:blur(90px);
  z-index:-1;
}

.top-bar{
  position:sticky;
  top:0;
  z-index:1000;
  backdrop-filter:blur(18px);
  background:var(--bg);
  padding-bottom:8px;
}

header{
  text-align:center;
  padding:14px;
  font-size:26px;
  font-weight:700;
}

nav{
  display:flex;
  gap:8px;
  overflow-x:auto;
  padding:8px 10px;
}
nav button{
  flex:0 0 auto;
  min-width:90px;
  border:none;
  border-radius:18px;
  background:var(--card);
  color:var(--text);
  cursor:pointer;
  transition:0.2s;
}
nav button.active{
  background:var(--main);
  color:#fff;
}

.controls{
  display:grid;
  grid-template-columns:1fr 1fr auto auto auto auto;
  gap:8px;
  padding:0 10px;
}
.controls select,.controls input{
  width:100%;
  min-width:0;
}

input,select{
  border:none;
  border-radius:14px;
  background:var(--card);
  padding:10px;
  color:var(--text);
}

.container{
  padding:10px;
  padding-bottom:180px;
}

.radio-card{
  background:var(--card);
  border-radius:18px;
  padding:12px;
  margin:8px 0;
  display:flex;
  justify-content:space-between;
  align-items:center;
  cursor:pointer;
  transition:0.2s;
  box-shadow:0 4px 14px rgba(0,0,0,.12);
}
.radio-card.active{outline:2px solid var(--main);}
.radio-card img{
  width:65px;height:65px;
  object-fit:cover;
  border-radius:12px;
}
.radio-card strong{
  display:block;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  max-width:180px;
}
small{color:var(--muted);}
.fav-btn{background:transparent;border:none;font-size:22px;cursor:pointer;}

.eq{display:flex;gap:3px;opacity:0;}
body.playing .eq{opacity:1;}
.eq span{
  width:4px;
  background:var(--main);
  animation:eq 1s infinite alternate;
}
.eq span:nth-child(2){animation-delay:.2s}
.eq span:nth-child(3){animation-delay:.4s}
@keyframes eq{from{height:5px;}to{height:22px;}}

.floating-player{
  position:fixed;
  left:10px;right:10px;
  bottom:12px;
  background:var(--card);
  backdrop-filter:blur(16px);
  border-radius:20px;
  padding:10px;
  box-shadow:0 8px 25px rgba(0,0,0,.18);
  transform:translateY(120%);
  transition:.35s;
  z-index:900;
}
body.playing .floating-player{transform:translateY(0);}
.floating-player audio{width:100%;}

.sheet{
  position:fixed;
  left:0;
  bottom:-100%;
  width:100%;
  height:85%;
  background:var(--card);
  border-radius:25px 25px 0 0;
  transition:.4s;
  z-index:999;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:15px;
  backdrop-filter:blur(20px);
}
.sheet.open{bottom:0;}
.sheet-handle{
  width:50px;height:5px;
  background:#999;border-radius:10px;
  margin-bottom:15px;
}
.sheet-img{
  width:220px;height:220px;
  border-radius:20px;
  object-fit:cover;
}
.load-more-btn{
  text-align:center;
  padding:12px;
  background:var(--card);
  border-radius:40px;
  margin:16px 0;
  cursor:pointer;
  font-weight:bold;
}
</style>
</head>
<body>

<div class="top-bar">
<header>🌍 Audio Engine UX PRO</header>
<nav>
<button class="active" data-mode="all">📻 راديو</button>
<button data-mode="news">📰 أخبار</button>
<button data-mode="quran">📖 قرآن</button>
<button data-mode="music">🎵 موسيقى</button>
<button data-mode="religious">🕌 ديني</button>
<button data-mode="fav">⭐ المفضلة</button>
</nav>
<div class="controls">
<select id="country"></select>
<input id="search" placeholder="🔍 بحث">
<button id="themeBtn">🌙</button>
<button id="shuffleBtn">🔀</button>
<button id="prevBtn">⏮</button>
<button id="nextBtn">⏭</button>
</div>
</div>

<div class="container" id="radioList"></div>

<div class="floating-player" id="floatingPlayer">
  <div class="now" id="nowPlaying">▶️ جاهز</div>
  <div class="eq"><span></span><span></span><span></span></div>
  <audio id="player" controls></audio>
</div>

<div id="sheet" class="sheet">
  <div class="sheet-handle"></div>
  <img id="sheetImg" class="sheet-img">
  <h2 id="sheetTitle">Now Playing</h2>
  <audio id="sheetPlayer" controls></audio>
</div>

<script>
// ------------------------- الإعدادات الأساسية -------------------------
const state = { mode: "all", stations: [], filtered: [], currentIndex: -1, currentPage: 0, pageSize: 25 };
let favs = JSON.parse(localStorage.getItem("favs") || "[]");

const rules = {
  all: /.*/,
  news: /news|talk|info|bbc|cnn/,
  quran: /quran|koran|islam|قرآن/,
  music: /music|pop|rock|jazz|classical|hits/,
  religious: /islam|religion|mosque|sermon|dawah/,
  fav: /.*/
};

// إضافة قائمة قرآنية ثابتة احتياطية (لضمان وجود محطات قرآنية دائماً)
const quranFallbackStations = [
  { name: "📖 إذاعة القرآن الكريم - مكة", url: "https://live.mp3quran.net:8000/afs", favicon: "https://cdn-icons-png.flaticon.com/512/3095/3095444.png", tags: "quran islam", bitrate: 128 },
  { name: "📖 إذاعة الشيخ السديس", url: "https://live.mp3quran.net:8000/sudais", favicon: "https://cdn-icons-png.flaticon.com/512/3095/3095444.png", tags: "quran", bitrate: 128 },
  { name: "📖 إذاعة المعيقلي", url: "https://live.mp3quran.net:8000/maher", favicon: "https://cdn-icons-png.flaticon.com/512/3095/3095444.png", tags: "quran", bitrate: 128 }
];

const player = document.getElementById("player");
const sheet = document.getElementById("sheet");
const sheetImg = document.getElementById("sheetImg");
const sheetTitle = document.getElementById("sheetTitle");
const sheetPlayer = document.getElementById("sheetPlayer");

// ربط المشغلين
sheetPlayer.addEventListener("play", () => { if (player.src !== sheetPlayer.src) { player.src = sheetPlayer.src; player.play(); } });
player.addEventListener("play", () => { sheetPlayer.src = player.src; document.body.classList.add("playing"); });
player.addEventListener("pause", () => document.body.classList.remove("playing"));
player.addEventListener("timeupdate", () => { if (sheetPlayer.src === player.src && !sheetPlayer.paused && !player.paused) sheetPlayer.currentTime = player.currentTime; });

// ------------------------- تحميل الدول (كما في الأصل - كل دول العالم) -------------------------
async function fetchCached(url) {
  const cache = await caches.open("radio-cache");
  const cached = await cache.match(url);
  if (cached) return cached.json();
  const response = await fetch(url);
  cache.put(url, response.clone());
  return response.json();
}

async function loadCountries() {
  const select = document.getElementById("country");
  select.innerHTML = "<option>🌍 جاري تحميل الدول...</option>";
  try {
    const data = await fetchCached("https://de1.api.radio-browser.info/json/countries");
    select.innerHTML = "";
    data.forEach(c => {
      const option = document.createElement("option");
      option.value = c.iso_3166_1.toLowerCase();
      option.textContent = `🌍 ${c.name}`;
      select.appendChild(option);
    });
    // استعادة آخر دولة مختارة
    const lastCountry = localStorage.getItem("lastCountry");
    if (lastCountry && [...select.options].some(opt => opt.value === lastCountry)) select.value = lastCountry;
    else select.value = "sa";
    select.onchange = () => {
      localStorage.setItem("lastCountry", select.value);
      loadRadios();
    };
    loadRadios();
  } catch (err) {
    console.error("فشل تحميل الدول", err);
    select.innerHTML = "<option value='sa'>🌍 السعودية</option><option value='us'>🇺🇸 الولايات المتحدة</option><option value='eg'>🇪🇬 مصر</option>";
    select.onchange = () => loadRadios();
    loadRadios();
  }
}

// تحميل المحطات حسب الدولة
async function loadRadios() {
  const countryCode = document.getElementById("country").value;
  if (!countryCode) return;
  const api = `https://de1.api.radio-browser.info/json/stations/bycountrycodeexact/${countryCode}?limit=200&hidebroken=true`;
  state.stations = await fetchCached(api);
  // دمج محطات القرآن الاحتياطية (لتكون ظاهرة حتى لو كانت الدولة لا تحتوي عليها)
  const existingNames = new Set(state.stations.map(s => s.name));
  for (let q of quranFallbackStations) {
    if (!existingNames.has(q.name)) state.stations.unshift(q);
  }
  applyFilter();
}

function applyFilter() {
  const q = document.getElementById("search").value.toLowerCase();
  state.filtered = state.mode === "fav"
    ? state.stations.filter(s => favs.includes(s.name))
    : state.stations.filter(s => {
        const text = (s.name + " " + (s.tags || "")).toLowerCase();
        return rules[state.mode].test(text) && text.includes(q);
      });
  state.currentPage = 0;
  render();
}

function render() {
  const container = document.getElementById("radioList");
  const start = state.currentPage * state.pageSize;
  const end = start + state.pageSize;
  const pageData = state.filtered.slice(start, end);
  if (state.currentPage === 0) container.innerHTML = "";
  pageData.forEach((s, idx) => {
    const globalIdx = start + idx;
    const card = document.createElement("div");
    card.className = "radio-card" + (globalIdx === state.currentIndex ? " active" : "");
    card.innerHTML = `
      <div style="display:flex; gap:12px; align-items:center;">
        <img src="${s.favicon || 'https://cdn-icons-png.flaticon.com/512/616/616490.png'}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/616/616490.png'">
        <div><strong>${escapeHtml(s.name)}</strong><small>${s.bitrate || "?"} kbps</small></div>
      </div>
      <button class="fav-btn" data-name="${escapeHtml(s.name)}" onclick="event.stopPropagation(); toggleFav('${escapeHtml(s.name).replace(/'/g, "\\'")}')">
        ${favs.includes(s.name) ? "⭐" : "☆"}
      </button>
    `;
    card.onclick = () => play(globalIdx);
    container.appendChild(card);
  });
  if (end < state.filtered.length && !document.querySelector(".load-more-btn")) {
    const moreBtn = document.createElement("div");
    moreBtn.className = "load-more-btn";
    moreBtn.innerText = "➕ تحميل المزيد";
    moreBtn.onclick = () => { state.currentPage++; render(); };
    container.appendChild(moreBtn);
  } else if (end >= state.filtered.length) {
    const existing = document.querySelector(".load-more-btn");
    if (existing) existing.remove();
  }
}

function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

function play(index) {
  if (index < 0 || index >= state.filtered.length) return;
  state.currentIndex = index;
  const s = state.filtered[index];
  const stream = s.url_resolved || s.url;
  if (!stream) return;
  player.src = stream;
  sheetPlayer.src = stream;
  player.play().catch(e => console.log("تشغيل تلقائي محظور"));
  document.getElementById("nowPlaying").innerText = "🎵 " + s.name;
  sheetTitle.innerText = s.name;
  sheetImg.src = s.favicon || "https://cdn-icons-png.flaticon.com/512/616/616490.png";
  sheetImg.onerror = () => sheetImg.src = "https://cdn-icons-png.flaticon.com/512/616/616490.png";
  // حفظ آخر محطة
  localStorage.setItem("lastStation", JSON.stringify({ name: s.name, url: stream, favicon: s.favicon }));
  render();
}

function next() { if (state.filtered.length) play((state.currentIndex + 1) % state.filtered.length); }
function prev() { if (state.currentIndex > 0) play(state.currentIndex - 1); else if (state.filtered.length) play(state.filtered.length - 1); }
function shuffle() { if (state.filtered.length) play(Math.floor(Math.random() * state.filtered.length)); }

function toggleFav(name) {
  if (favs.includes(name)) favs = favs.filter(f => f !== name);
  else favs.push(name);
  localStorage.setItem("favs", JSON.stringify(favs));
  if (state.mode === "fav") applyFilter();
  else render();
}

function setMode(mode, btn) {
  state.mode = mode;
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  applyFilter();
}

function toggleTheme() {
  document.body.classList.toggle("dark");
  localStorage.setItem("theme", document.body.classList.contains("dark"));
  document.getElementById("themeBtn").innerHTML = document.body.classList.contains("dark") ? "🌞" : "🌙";
}

// الأحداث
document.getElementById("themeBtn").onclick = toggleTheme;
document.getElementById("shuffleBtn").onclick = shuffle;
document.getElementById("prevBtn").onclick = prev;
document.getElementById("nextBtn").onclick = next;
document.getElementById("search").oninput = applyFilter;

document.querySelectorAll("nav button").forEach(btn => {
  btn.onclick = () => setMode(btn.dataset.mode, btn);
});

document.getElementById("floatingPlayer").onclick = () => sheet.classList.add("open");

let startY = 0;
sheet.addEventListener("touchstart", e => startY = e.touches[0].clientY);
sheet.addEventListener("touchmove", e => { if (e.touches[0].clientY - startY > 80) sheet.classList.remove("open"); });
sheet.querySelector(".sheet-handle").addEventListener("click", () => sheet.classList.remove("open"));

// استعادة الثيم
if (localStorage.getItem("theme") === "true" || localStorage.getItem("theme") === "dark") {
  document.body.classList.add("dark");
  document.getElementById("themeBtn").innerHTML = "🌞";
} else {
  document.getElementById("themeBtn").innerHTML = "🌙";
}

// بدء التشغيل
loadCountries();
</script>
</body>
</html>
