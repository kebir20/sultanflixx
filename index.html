if(
url.includes("vidsrc") ||
url.includes("youtube") ||
url.includes("vidlink") ||
url.includes("multiembed")
){
return realOpen(url)
}

let bannerTimer  
  
function changeBanner(list){  
  
clearInterval(bannerTimer)  
  
bannerIndex = 0  
  
function update(){  
  
const m = list[bannerIndex]  
  
if(!m.backdrop_path){
bannerIndex++
if(bannerIndex>=list.length) bannerIndex=0
return
}  
  
banner.style.backgroundImage =
`url(https://image.tmdb.org/t/p/w780${m.backdrop_path})`  
  
banner.innerHTML = `  
<div style="background:linear-gradient(transparent,black);padding:20px">  
${m.title || m.name}<br>  
<button class="playBtn"  
onclick="${m.title ? 'openMoviePage' : 'openSeriesPage'}(${m.id})">  
▶ Watch  
</button>  
</div>  
`  
  
bannerIndex++  
  
if(bannerIndex>=list.length) bannerIndex=0  
  
}  
  
update()  
  
bannerTimer = setInterval(update,5000)  
  
}

let searchTimeout  
  
function smartSearch(){  
  
clearTimeout(searchTimeout)  
  
searchTimeout=setTimeout(async()=>{  
  
const q=document.getElementById("searchInput").value.trim()  
  
if(q.length<2){  
document.getElementById("searchResults").innerHTML=""  
return  
}  
  
const res=await fetch(`${API}/search/multi?api_key=${KEY}&language=${LANG}&query=${q}`)  
const data=await res.json()  
  
// إخفاء الأقسام  
moviesSection.style.display="none"  
seriesSection.style.display="none"  
  
const container=document.getElementById("searchResults")  
container.innerHTML=""  
  
// صف الأفلام  
const movieRow=document.createElement("div")  
movieRow.innerHTML="<h2>🎬 Movies</h2>"  
const movieGrid=document.createElement("div")  
movieGrid.className="row"  
  
// صف المسلسلات  
const tvRow=document.createElement("div")  
tvRow.innerHTML="<h2>📺 Series</h2>"  
const tvGrid=document.createElement("div")  
tvGrid.className="row"  
  
data.results.forEach(m=>{  
  
if(!m.poster_path)return  
  
const card=document.createElement("div")  
card.className="card"  
card.tabIndex=0
let type = m.media_type==="movie" ? "🎬 Movie" : "📺 TV"  
  
card.innerHTML=`  
<img loading="lazy" decoding="async" src="${IMG+m.poster_path}">  
<div>${m.title||m.name}</div>  
<small style="opacity:.7">${type}</small>  
`  
  
card.onclick=()=>{  
if(m.media_type==="movie"){  
openMoviePage(m.id)  
}else{  
openSeriesPage(m.id)  
}  
}  
  
if(m.media_type==="movie"){  
movieGrid.appendChild(card)  
}  
  
if(m.media_type==="tv"){  
tvGrid.appendChild(card)  
}  
  
})  
  
movieRow.appendChild(movieGrid)  
tvRow.appendChild(tvGrid)  
  
container.appendChild(movieRow)  
container.appendChild(tvRow)  
  
},250)  
  
}

async function createRow(title,url,container,type){

const section=document.createElement("div")
section.innerHTML=`<h2>${title}</h2>`

const row=document.createElement("div")
row.className="row"

section.appendChild(row)
document.getElementById(container).appendChild(section)

let page=1
let loading=false

async function loadPage(){

if(loading) return
loading=true

let link = url.includes("?")
? `${API}${url}api_key=${KEY}&language=${LANG}&page=${page}`
: `${API}${url}?api_key=${KEY}&language=${LANG}&page=${page}`

const res=await fetch(link)
const data=await res.json()

data.results.forEach(m=>{

if(!m.poster_path) return

const card=document.createElement("div")
card.className="card"
card.tabIndex=0
card.innerHTML=`
<img loading="lazy" decoding="async" src="${IMG+m.poster_path}">
<div>${m.title||m.name}</div>
`

card.onclick=()=>{
if(type==="tv"){
openSeriesPage(m.id)
}else{
openMoviePage(m.id)
}
}

row.appendChild(card)

})

page++
loading=false

}

// تحميل أول 3 صفحات مباشرة
await loadPage()
await loadPage()
await loadPage()

// باقي الصفحات عند السحب
row.addEventListener("scroll",()=>{

if(row.scrollLeft + row.clientWidth >= row.scrollWidth-200){
loadPage()
}

})

}  
  

const observer = new IntersectionObserver((entries)=>{

entries.forEach(entry=>{

if(entry.isIntersecting){

const el = entry.target

createRow(
el.dataset.title,
el.dataset.url,
el.dataset.container,
el.dataset.type
)

observer.unobserve(el)

el.remove()

}

})

},{
rootMargin:"400px"
})  
  
function lazyRow(title,url,container,type){

const placeholder=document.createElement("div")

placeholder.dataset.title=title
placeholder.dataset.url=url
placeholder.dataset.container=container
placeholder.dataset.type=type

placeholder.style.minHeight="320px"

const skeletonRow=document.createElement("div")
skeletonRow.className="row"

for(let i=0;i<6;i++){

const sk=document.createElement("div")
sk.className="skeleton"

skeletonRow.appendChild(sk)

}

placeholder.appendChild(skeletonRow)

document.getElementById(container).appendChild(placeholder)

observer.observe(placeholder)

}

  document.addEventListener("keydown",function(e){

const focus=document.activeElement

if(!focus.classList.contains("card")) return

if(e.key==="Enter"){
focus.click()
}

if(e.key==="ArrowRight"){

let next = focus.nextElementSibling

if(next){
next.focus()

next.scrollIntoView({
behavior:"smooth",
inline:"center",
block:"nearest"
})

}

}

if(e.key==="ArrowLeft"){

let prev = focus.previousElementSibling

if(prev){
prev.focus()

prev.scrollIntoView({
behavior:"smooth",
inline:"center",
block:"nearest"
})

}

}

if(e.key==="ArrowDown"){

let row = focus.closest(".row")
let nextRow = row.parentElement.nextElementSibling?.querySelector(".row")

if(nextRow){

let index = [...row.children].indexOf(focus)

let target = nextRow.children[index] || nextRow.children[0]

target.focus()

target.scrollIntoView({
behavior:"smooth",
inline:"center",
block:"center"
})

}

}

if(e.key==="ArrowUp"){

let row = focus.closest(".row")
let prevRow = row.parentElement.previousElementSibling?.querySelector(".row")

if(prevRow){

let index = [...row.children].indexOf(focus)

let target = prevRow.children[index] || prevRow.children[0]

target.focus()

target.scrollIntoView({
behavior:"smooth",
inline:"center",
block:"center"
})

}

}

})
